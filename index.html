<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Defender V4 - Ultimate</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --neon-blue: #00f0ff;
      --neon-pink: #ff4466;
      --neon-green: #44ffaa;
      --neon-yellow: #ffaa00;
      --dark-bg: rgba(5, 5, 15, 0.85);
      
      /* Control Customization Variables */
      --btn-size: 80px;
      --btn-gap: 20px;
      --btn-bottom: 30px;
    }

    * {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    body {
      background: #020205;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; height: 100dvh; /* Dynamic viewport for mobile Safari/Chrome */
      overflow: hidden;
      font-family: 'Rajdhani', sans-serif;
      touch-action: none; /* Cegah zoom dan scroll */
    }

    #gw {
      background: radial-gradient(circle at center, #0a0a20 0%, #000000 100%);
      position: relative;
      width: 100vw; height: 100vh; height: 100dvh;
      max-width: 768px;
      box-shadow: 0 0 50px rgba(0, 240, 255, 0.1);
      overflow: hidden;
    }

    canvas {
      display: block; width: 100%; height: 100%;
      image-rendering: pixelated;
    }

    /* =========================================
       UI PANELS (GLASSMORPHISM & NEON)
       ========================================= */
    .overlay-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--dark-bg);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 50; transition: opacity 0.3s ease;
    }
    .hidden { display: none !important; opacity: 0; pointer-events: none; }

    .hologram-box {
      background: rgba(10, 10, 30, 0.7);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 15px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1) inset, 0 10px 30px rgba(0,0,0,0.8);
      animation: float 4s ease-in-out infinite;
      width: 90%; max-width: 400px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1.title-main {
      font-family: 'Orbitron', sans-serif; font-size: 50px; font-weight: 900;
      color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue), 0 0 30px #000;
      margin-bottom: -10px; text-transform: uppercase; letter-spacing: 2px;
    }
    h2.title-sub {
      font-family: 'Orbitron', sans-serif; font-size: 28px;
      color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink);
      margin-bottom: 30px; letter-spacing: 5px;
    }

    /* Buttons */
    .cyber-btn {
      background: linear-gradient(90deg, rgba(0,240,255,0.1), rgba(0,240,255,0));
      border: 1px solid var(--neon-blue); color: var(--neon-blue);
      font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: bold;
      padding: 15px 30px; margin: 10px; border-radius: 5px;
      cursor: pointer; width: 100%; max-width: 300px;
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.2s; position: relative; overflow: hidden;
    }
    .cyber-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg); transition: 0.5s;
    }
    .cyber-btn:hover::before { left: 150%; }
    .cyber-btn:hover, .cyber-btn:active {
      background: var(--neon-blue); color: #000;
      box-shadow: 0 0 20px var(--neon-blue);
    }
    .cyber-btn.multi { border-color: var(--neon-yellow); color: var(--neon-yellow); }
    .cyber-btn.multi:hover { background: var(--neon-yellow); color: #000; box-shadow: 0 0 20px var(--neon-yellow); }
    .cyber-btn.danger { border-color: var(--neon-pink); color: var(--neon-pink); }
    .cyber-btn.danger:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 20px var(--neon-pink); }

    /* Inputs */
    .cyber-input {
      background: rgba(0,0,0,0.5); border: 1px solid var(--neon-blue);
      color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 20px;
      padding: 10px 15px; margin-bottom: 20px; width: 100%; border-radius: 5px;
      text-align: center; outline: none;
    }
    .cyber-input:focus { box-shadow: 0 0 15px rgba(0,240,255,0.5) inset; }

    /* =========================================
       IN-GAME HUD & CONTROLS
       ========================================= */
    #hud {
      position: absolute; top: 0; left: 0; width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; background: linear-gradient(180deg, rgba(0,0,20,0.9) 0%, transparent 100%);
      z-index: 20; pointer-events: none;
    }
    .hud-stat {
      font-family: 'Orbitron', sans-serif; font-size: 16px; font-weight: bold;
    }

    #btnPause {
      pointer-events: auto; background: rgba(0,240,255,0.1); border: 1px solid var(--neon-blue);
      color: var(--neon-blue); width: 40px; height: 40px; border-radius: 50%;
      font-size: 18px; display: flex; justify-content: center; align-items: center;
      cursor: pointer; backdrop-filter: blur(5px);
    }

    /* Mobile Controls - Dibuat Fleksibel */
    #pad {
      position: absolute; bottom: var(--btn-bottom); left: 0; width: 100%;
      display: flex; justify-content: space-between; padding: 0 var(--btn-gap);
      z-index: 20; pointer-events: none;
    }
    .btn-steer {
      pointer-events: auto;
      background: rgba(255,255,255,0.05); border: 2px solid rgba(0, 240, 255, 0.4);
      color: rgba(255,255,255,0.6); border-radius: 15px;
      width: clamp(60px, var(--btn-size), 150px);
      height: clamp(60px, var(--btn-size), 150px);
      font-size: calc(var(--btn-size) * 0.3);
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(5px); transition: 0.1s;
    }
    .btn-steer:active {
      background: rgba(0, 240, 255, 0.3); border-color: var(--neon-blue);
      color: #fff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.5) inset; transform: scale(0.95);
    }

    /* Custom Alert / Notifications */
    #customAlert {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 68, 102, 0.9); color: white; padding: 10px 25px;
      border-radius: 20px; font-weight: bold; z-index: 100;
      box-shadow: 0 5px 15px rgba(255, 68, 102, 0.5);
      animation: slideDown 0.3s ease-out;
    }
    @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }

    /* Lobby List */
    .player-card {
      background: rgba(0,0,0,0.5); padding: 10px; margin: 5px 0;
      border-left: 3px solid var(--neon-green); text-align: left;
      display: flex; justify-content: space-between;
    }
    .spinner {
      width: 40px; height: 40px; border: 4px solid rgba(0, 240, 255, 0.2);
      border-top-color: var(--neon-blue); border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 20px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<audio id="bgmMenu" loop><source src="https://opengameart.org/sites/default/files/Space%20Boss%20Battle%20Theme.mp3" type="audio/mpeg"></audio>
<audio id="bgmGame" loop><source src="https://opengameart.org/sites/default/files/bossa_nova_0.mp3" type="audio/mpeg"></audio>

<div id="gw">
  <canvas id="gameCanvas"></canvas>
  
  <div id="hud" class="hidden">
    <div style="display:flex; flex-direction:column;">
      <span class="hud-stat" id="hudScore" style="color:var(--neon-blue);">SCORE: 0</span>
      <span class="hud-stat" id="hudLv" style="color:var(--neon-yellow);">LV 1</span>
    </div>
    <div id="btnPause">⏸</div>
    <span class="hud-stat" id="hudLives" style="color:var(--neon-pink); font-size:20px;">❤️❤️❤️</span>
  </div>
  
  <div id="pad" class="hidden">
    <div class="btn-steer" id="btnLeft">◀</div>
    <div class="btn-steer" id="btnRight">▶</div>
  </div>

  <div id="panelAuth" class="overlay-panel">
    <div class="hologram-box">
      <h2 style="color:var(--neon-blue); margin-bottom:15px;">PILOT IDENTIFICATION</h2>
      <input type="text" id="inputName" class="cyber-input" placeholder="Enter Callsign..." maxlength="10">
      <button class="cyber-btn" onclick="saveName()">INITIALIZE</button>
    </div>
  </div>

  <div id="panelMenu" class="overlay-panel hidden">
    <h1 class="title-main">COSMIC</h1>
    <h2 class="title-sub">DEFENDER</h2>
    <div class="hologram-box" style="padding: 20px;">
      <div id="welcomeText" style="color:#fff; margin-bottom:15px; font-weight:bold;">Welcome, Pilot</div>
      <button class="cyber-btn" onclick="startGame('solo')">SOLO MISSION</button>
      <button class="cyber-btn multi" onclick="joinLobby()">MULTIPLAYER</button>
      <button class="cyber-btn" style="border-color:var(--neon-green); color:var(--neon-green)" onclick="togglePanel('panelSettings')">SETTINGS</button>
    </div>
  </div>

  <div id="panelLobby" class="overlay-panel hidden">
    <div class="hologram-box">
      <h2 style="color:var(--neon-yellow);">WARP GATE LOBBY</h2>
      <div class="spinner"></div>
      <p style="color:#aaa; font-size:14px; margin-bottom:15px;">Menunggu player lain masuk ke ruangan...</p>
      
      <div id="lobbyPlayers" style="margin-bottom: 20px; max-height: 150px; overflow-y:auto;">
        </div>
      
      <p id="lobbyStatus" style="color:var(--neon-green); font-weight:bold; margin-bottom:15px;">Menunggu...</p>
      
      <button class="cyber-btn danger" onclick="leaveLobby()">CANCEL ABORT</button>
    </div>
  </div>

  <div id="panelSettings" class="overlay-panel hidden">
    <div class="hologram-box">
      <h2 style="color:var(--neon-green);">UI CUSTOMIZATION</h2>
      
      <div style="text-align:left; color:#fff; margin-bottom: 10px;">
        <label>Button Size: <span id="valSize">80px</span></label>
        <input type="range" id="slSize" min="50" max="150" value="80" style="width:100%; margin-top:5px;">
      </div>
      
      <div style="text-align:left; color:#fff; margin-bottom: 10px;">
        <label>Side Gap: <span id="valGap">20px</span></label>
        <input type="range" id="slGap" min="0" max="100" value="20" style="width:100%; margin-top:5px;">
      </div>

      <div style="text-align:left; color:#fff; margin-bottom: 20px;">
        <label>Bottom Margin: <span id="valBot">30px</span></label>
        <input type="range" id="slBot" min="10" max="200" value="30" style="width:100%; margin-top:5px;">
      </div>

      <button class="cyber-btn" onclick="togglePanel('panelMenu')">SAVE & CLOSE</button>
    </div>
  </div>

  <div id="panelPause" class="overlay-panel hidden" style="background: rgba(0,0,0,0.8);">
    <h1 style="color:var(--neon-blue); font-family:Orbitron; font-size:40px; margin-bottom:30px;">SYSTEM PAUSED</h1>
    <button class="cyber-btn" onclick="triggerResume()">RESUME GAME</button>
    <button class="cyber-btn danger" onclick="quitGame()">ABORT MISSION</button>
  </div>

</div>

<div id="customAlert" class="hidden">Message</div>

<script>
// ==========================================
// 1. GLOBAL VARIABLES & CONFIG
// ==========================================
let playerName = localStorage.getItem('cosmic_name') || "";
let gameMode = 'solo';
let state = 'auth'; // auth, menu, lobby, playing, paused, resuming, gameover
let frame = 0;

// Konstanta Supabase (Gunakan Key Public Anda)
const SUPABASE_URL = 'https://blvfsbsgtbvnuaisglmz.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_uI4hO-j7K8QWim1fVGQvSw_IrKtp1kP'; 
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let roomChannel = null;
let amIHost = false;

// Audio Context untuk SFX Generator
let audioCtx = null;
const bgmMenu = document.getElementById('bgmMenu');
const bgmGame = document.getElementById('bgmGame');
bgmMenu.volume = 0.3; bgmGame.volume = 0.4;

// Canvas Setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
}
window.addEventListener('resize', resize);
resize();

// Game Entities
const keys = {left:false, right:false};
let score = 0, lives = 3, level = 1, resumeTimer = 0;
const player = {x:W/2, y:H+100, targetX:W/2, invincible:0, shake:0, speed:7}; 
const player2 = {x:W/2, y:H-120, active:false, name:"Ally", score:0}; 

const bullets=[], eBullets=[], enemies=[], parts=[], stars=[], shockwaves=[];
let shotCD=0, eShootT=0, bossActive=false, boss=null, levelClearT=0;

// ==========================================
// 2. UI & SETTINGS MANAGER
// ==========================================
function showAlert(msg, type="error") {
  const alertBox = document.getElementById('customAlert');
  alertBox.textContent = msg;
  alertBox.style.background = type === "error" ? "rgba(255, 68, 102, 0.9)" : "rgba(68, 255, 170, 0.9)";
  alertBox.classList.remove('hidden');
  setTimeout(() => alertBox.classList.add('hidden'), 3000);
}

function togglePanel(panelId) {
  document.querySelectorAll('.overlay-panel').forEach(p => p.classList.add('hidden'));
  if(panelId) document.getElementById(panelId).classList.remove('hidden');
}

function initUI() {
  if (playerName) {
    document.getElementById('welcomeText').textContent = `Welcome back, ${playerName}`;
    togglePanel('panelMenu');
    playBGM(bgmMenu);
  } else {
    togglePanel('panelAuth');
  }

  // Bind Settings Sliders
  const root = document.documentElement;
  document.getElementById('slSize').oninput = (e) => { root.style.setProperty('--btn-size', e.target.value+'px'); document.getElementById('valSize').innerText = e.target.value+'px'; };
  document.getElementById('slGap').oninput = (e) => { root.style.setProperty('--btn-gap', e.target.value+'px'); document.getElementById('valGap').innerText = e.target.value+'px'; };
  document.getElementById('slBot').oninput = (e) => { root.style.setProperty('--btn-bottom', e.target.value+'px'); document.getElementById('valBot').innerText = e.target.value+'px'; };
}

function saveName() {
  const input = document.getElementById('inputName').value.trim();
  if(input.length < 3) return showAlert("Callsign minimal 3 huruf!");
  playerName = input.toUpperCase();
  localStorage.setItem('cosmic_name', playerName);
  playSFX(600, 0.1, 0.1, 'sine');
  initUI();
}

function playBGM(track) {
  bgmMenu.pause(); bgmGame.pause();
  track.currentTime = 0;
  track.play().catch(e => console.log("BGM butuh interaksi user"));
}

// Synth SFX
function playSFX(freq, vol, dur, type='square'){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.frequency.value=freq; o.type=type;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ==========================================
// 3. MULTIPLAYER LOGIC (SUPABASE PRESENCE)
// ==========================================
function joinLobby() {
  togglePanel('panelLobby');
  gameMode = 'multi';
  document.getElementById('lobbyStatus').innerText = "Menghubungkan ke satelit...";
  document.getElementById('lobbyPlayers').innerHTML = '';

  // Buat channel khusus matchmaking room
  roomChannel = supabaseClient.channel('global_room');

  roomChannel
    .on('presence', { event: 'sync' }, () => {
      const state = roomChannel.presenceState();
      let users = [];
      for (const id in state) { users.push(state[id][0]); }
      
      // Update UI Lobby
      let html = '';
      users.forEach(u => {
        html += `<div class="player-card"><span>${u.name}</span> <span style="color:var(--neon-green)">READY</span></div>`;
      });
      document.getElementById('lobbyPlayers').innerHTML = html;

      // Logika Mulai Game (Jika pas 2 orang)
      if (users.length === 2) {
        document.getElementById('lobbyStatus').innerText = "LINK ESTABLISHED! STARTING...";
        // Tentukan Host (yang join pertama)
        amIHost = (users[0].joined_at < users[1].joined_at) ? (playerName === users[0].name) : (playerName === users[1].name);
        player2.name = (users[0].name === playerName) ? users[1].name : users[0].name;
        
        setTimeout(() => startGame('multi'), 2000);
      } else if (users.length > 2) {
        document.getElementById('lobbyStatus').innerText = "Ruangan penuh. Silakan coba lagi nanti.";
      } else {
        document.getElementById('lobbyStatus').innerText = "Menunggu pilot kedua...";
      }
    })
    .on('broadcast', { event: 'game_action' }, (payload) => {
      handleNetworkAction(payload.action, payload.data);
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        const joinStatus = await roomChannel.track({ name: playerName, joined_at: Date.now() });
      }
    });
}

function leaveLobby() {
  if(roomChannel) supabaseClient.removeChannel(roomChannel);
  togglePanel('panelMenu');
}

function broadcastAction(action, data) {
  if(gameMode === 'multi' && roomChannel) {
    roomChannel.send({ type: 'broadcast', event: 'game_action', payload: { action, data } });
  }
}

function handleNetworkAction(action, data) {
  if (action === 'move') {
    player2.targetX = data.x;
    player2.active = true;
  } else if (action === 'shoot') {
    bullets.push({x: player2.x, y: player2.y-20, vy: -10, col: '#44ffaa', isP2: true});
    playSFX(850, 0.03, 0.05); 
  } else if (action === 'pause') {
    state = 'paused'; togglePanel('panelPause');
  } else if (action === 'resume') {
    triggerResume(false); // false = jangan broadcast balik untuk hindari loop
  }
}

// ==========================================
// 4. GAME ENGINE (LOGIC & RENDER)
// ==========================================
function startGame(mode) {
  gameMode = mode;
  togglePanel(null); // Sembunyikan semua panel
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('pad').classList.remove('hidden');
  
  playBGM(bgmGame);
  score=0; lives=3; level=1; frame=0;
  player.x=W/2; player.y=H+100; player.invincible=0; player.targetX = W/2;
  player2.active = (mode === 'multi'); player2.x = W/2; player2.targetX = W/2;
  bullets.length=0; eBullets.length=0; parts.length=0; shockwaves.length=0; bossActive=false;
  
  initStars();
  state = 'intro';
}

function triggerPause() {
  if(state !== 'playing') return;
  state = 'paused';
  togglePanel('panelPause');
  playSFX(300, 0.1, 0.2, 'sawtooth');
  broadcastAction('pause', {});
}

function triggerResume(sendNet = true) {
  if(state !== 'paused') return;
  togglePanel(null);
  state = 'resuming';
  resumeTimer = 3 * 60; // 3 detik (asumsi 60fps)
  playSFX(500, 0.1, 0.2);
  if(sendNet) broadcastAction('resume', {});
}

function quitGame() {
  state = 'menu';
  if(roomChannel) supabaseClient.removeChannel(roomChannel);
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('pad').classList.add('hidden');
  playBGM(bgmMenu);
  togglePanel('panelMenu');
}

function gameOver() {
  state = 'gameover';
  bgmGame.pause();
  spawnParts(player.x,player.y,'#ff4466',50, true);
  playSFX(100, 0.5, 1, 'sawtooth');
  
  setTimeout(() => {
    showAlert(`MISSION FAILED! Final Score: ${score}`, "error");
    quitGame();
  }, 3000);
}

// --- Entities Spawner ---
function initStars(){
  stars.length=0;
  for(let i=0;i<100;i++) stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.5, spd:Math.random()*2+1, b:Math.random()});
}

function spawnParts(x, y, col, n=15, isBig=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28; const s = isBig ? Math.random()*7+2 : Math.random()*4+1;
    parts.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, dec: 0.02+Math.random()*0.03, r: isBig ? Math.random()*5+2 : Math.random()*2+1, col});
  }
  shockwaves.push({x, y, r: 5, maxR: isBig ? 80 : 35, alpha: 1, col, speed: isBig ? 4 : 2});
}

const EC=['#ff4466','#ff6600','#aa44ff','#44ffaa','#ffcc00'];
function spawnEnemies(){
  enemies.length=0; eBullets.length=0;
  const rows=Math.min(2+Math.floor(level/2), 5), cols=Math.min(4+level, 7);
  const startX = W/2 - ((cols-1)*45)/2;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    enemies.push({x:startX+c*45, y: -50 - r*40, targetY: 40+r*40, hp:(level>4)?2:1, color:EC[(r+level)%EC.length], dir:1, t:Math.random()*6.28});
  }
}

function spawnBoss(){
  bossActive=true;
  boss={x:W/2, y:-100, targetY: 80, hp:30+level*5, maxHp:30+level*5, dx:2, dir:1, t:0, st:0};
}

// --- Main Loop Update ---
function update() {
  frame++;
  if(state === 'auth' || state === 'menu' || state === 'lobby' || state === 'paused') return;

  // Starfield animasi jalan terus
  stars.forEach(s => {
    s.y += s.spd * (state==='intro' || state==='resuming' ? 4 : 1); 
    if(s.y>H){ s.y=0; s.x=Math.random()*W; }
  });

  if(state === 'resuming') {
    resumeTimer--;
    if(resumeTimer <= 0) state = 'playing';
    return; // Freeze entities saat resume
  }

  if(state === 'intro') {
    player.y += (H - 120 - player.y) * 0.05; 
    if(Math.abs(player.y - (H - 120)) < 1) { player.y = H - 120; state = 'playing'; spawnEnemies(); }
    return;
  }

  if(state === 'gameover') { updateParticles(); return; }

  if(state === 'levelclear') {
    levelClearT++; player.y -= 2; updateParticles();
    if(levelClearT >= 100){
      level++; player.y = H-120;
      if(level%5===0) spawnBoss(); else spawnEnemies();
      state='playing'; levelClearT=0; showAlert(`SECTOR ${level} REACHED`, "success");
    }
    return;
  }

  // Player 1 Movement (Smoothing)
  if(keys.left) player.targetX -= player.speed;
  if(keys.right) player.targetX += player.speed;
  player.targetX = Math.max(20, Math.min(W-20, player.targetX));
  player.x += (player.targetX - player.x) * 0.3;

  // Sync P1 Move
  if(Math.abs(player.targetX - player.x) > 0.5 && frame % 3 === 0) broadcastAction('move', {x: player.x});

  // Player 2 Movement Interpolation
  if(player2.active) { player2.x += (player2.targetX - player2.x) * 0.3; }

  // Shooting
  if(shotCD <= 0) {
    let bCol = level >= 5 ? '#ffaa00' : '#00f0ff';
    if(level < 3) bullets.push({x:player.x, y:player.y-20, vy:-12, col:bCol});
    else {
      bullets.push({x:player.x-8, y:player.y-20, vy:-12, col:bCol});
      bullets.push({x:player.x+8, y:player.y-20, vy:-12, col:bCol});
    }
    broadcastAction('shoot', {});
    shotCD = 10; playSFX(800, 0.05, 0.05);
  }
  if(shotCD>0) shotCD--;

  // Update Bullets
  bullets.forEach(b=>{ b.y+=b.vy; if(b.vx)b.x+=b.vx; });
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].y<-10) bullets.splice(i,1);
  if(player.invincible>0) player.invincible--;

  // Enemies Update
  if(!bossActive) {
    // BUG FIX 1: Membatasi kecepatan dan drop musuh
    let spdLimit = Math.min(2.5, 1 + level * 0.1); 
    let dropDist = Math.min(15, 5 + level); // Drop maksimal 15px
    let edge = false;

    enemies.forEach(e => {
      // Intro drop
      if(e.y < e.targetY) e.y += 2;
      else {
        e.x += spdLimit * e.dir; e.t += 0.08;
        if(e.x > W-20 || e.x < 20) edge = true;
      }
    });

    if(edge) enemies.forEach(e => { e.dir *= -1; e.y += dropDist; });

    // Collision Player vs Enemy
    enemies.forEach(e => {
      if(e.y > player.y-30 && player.invincible <= 0) { hitPlayer(); }
    });

    // Enemy Shooting
    eShootT++;
    if(eShootT >= Math.max(30, 80-level*5) && enemies.length > 0) {
      eShootT = 0;
      let sh = enemies[Math.floor(Math.random()*enemies.length)];
      eBullets.push({x:sh.x, y:sh.y+15, vy: 3+level*0.2}); playSFX(300, 0.02, 0.1, 'sawtooth');
    }

    if(enemies.length === 0 && state === 'playing') { state='levelclear'; levelClearT=0; }
  } else if (boss) {
    // Boss Logic
    if(boss.y < boss.targetY) boss.y += 1;
    else {
      boss.t += 0.04; boss.x += boss.dx * boss.dir;
      if(boss.x > W-70 || boss.x < 70) boss.dir *= -1;
      boss.y = 80 + Math.sin(boss.t)*30;
      boss.st++;
      if(boss.st >= Math.max(20, 50-level*2)) {
        boss.st=0;
        for(let a=-2; a<=2; a+=2) eBullets.push({x:boss.x+a*15, y:boss.y+40, vy:4+level*0.2, vx:a});
        playSFX(250, 0.05, 0.1, 'sawtooth');
      }
    }
  }

  // Enemy Bullets logic
  for(let i=eBullets.length-1; i>=0; i--) {
    let b = eBullets[i]; b.y += b.vy; if(b.vx) b.x += b.vx;
    if(b.y > H+10) { eBullets.splice(i,1); continue; }
    if(player.invincible<=0 && Math.abs(b.x-player.x)<12 && Math.abs(b.y-player.y)<12){
      hitPlayer(); eBullets.splice(i,1);
    }
  }

  // Player Bullets hit logic (Host checking or Solo)
  for(let i=bullets.length-1; i>=0; i--) {
    let b = bullets[i]; let hit = false;
    
    // Hit Boss
    if(bossActive && boss && Math.abs(b.x-boss.x)<50 && Math.abs(b.y-boss.y)<30){
      boss.hp--; hit=true; spawnParts(b.x, b.y, '#ffaa00', 5); 
      if(!b.isP2) score += 10; playSFX(500, 0.05, 0.05);
      if(boss.hp <= 0) {
        spawnParts(boss.x, boss.y, '#ff4466', 80, true); score+=1000;
        bossActive=false; boss=null; state='levelclear'; levelClearT=0; playSFX(100, 0.5, 1, 'sawtooth');
      }
    }

    // Hit Enemies
    for(let j=enemies.length-1; j>=0 && !hit; j--) {
      let e = enemies[j];
      if(Math.abs(b.x-e.x)<20 && Math.abs(b.y-e.y)<15) {
        e.hp--; hit = true;
        if(e.hp <= 0) {
          spawnParts(e.x, e.y, e.color, 15); enemies.splice(j,1); 
          if(!b.isP2) score += 20; playSFX(400, 0.05, 0.1);
        } else {
          spawnParts(e.x, e.y, '#fff', 5);
        }
      }
    }
    if(hit) bullets.splice(i,1);
  }

  updateParticles();
}

function hitPlayer() {
  lives--; player.invincible = 60; player.shake = 15;
  spawnParts(player.x, player.y, '#00f0ff', 30, true); playSFX(150, 0.3, 0.5, 'square');
  updateHUD();
  if(lives <= 0) gameOver();
}

function updateParticles() {
  for(let i=parts.length-1;i>=0;i--){
    let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95; p.life-=p.dec;
    if(p.life<=0) parts.splice(i,1);
  }
  for(let i=shockwaves.length-1;i>=0;i--){
    let sw=shockwaves[i]; sw.r+=sw.speed; sw.alpha-=0.05;
    if(sw.alpha<=0) shockwaves.splice(i,1);
  }
}

// --- Main Render ---
function draw() {
  ctx.clearRect(0,0,W,H);
  
  // Draw Stars
  stars.forEach(s => {
    let b = 0.2 + s.b * 0.8;
    ctx.fillStyle = `rgba(255,255,255,${b})`;
    ctx.fillRect(s.x, s.y, s.r, s.r); // Box stars retro look
  });

  if(state === 'auth' || state === 'menu' || state === 'lobby') return;

  // Effects
  ctx.lineWidth = 2;
  shockwaves.forEach(sw => {
    ctx.globalAlpha = Math.max(0, sw.alpha); ctx.strokeStyle = sw.col;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha = 1;

  parts.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.col;
    ctx.fillRect(p.x-p.r, p.y-p.r, p.r*2, p.r*2);
  });
  ctx.globalAlpha = 1;

  // Entities
  bullets.forEach(b => {
    ctx.shadowColor = b.col; ctx.shadowBlur = 10; ctx.fillStyle = b.col;
    ctx.fillRect(b.x-2, b.y-8, 4, 16); ctx.shadowBlur = 0;
  });
  eBullets.forEach(b => {
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10; ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
  });

  if(!bossActive) {
    enemies.forEach(e => {
      ctx.save(); ctx.translate(e.x, e.y);
      let s = 1 + Math.sin(e.t)*0.1; ctx.scale(s, s);
      ctx.fillStyle = e.color; ctx.shadowColor = e.color; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(12,-5); ctx.lineTo(10,10); ctx.lineTo(-10,10); ctx.lineTo(-12,-5); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#222'; ctx.fillRect(-4, 0, 8, 4); // Visor
      ctx.restore();
    });
  } else if(boss) {
    ctx.save(); ctx.translate(boss.x, boss.y);
    ctx.fillStyle = '#220011'; ctx.strokeStyle = '#ff4466'; ctx.lineWidth=3; ctx.shadowColor='#ff4466'; ctx.shadowBlur=20;
    ctx.beginPath(); ctx.moveTo(0,-30); ctx.lineTo(40,-10); ctx.lineTo(50,20); ctx.lineTo(20,30); ctx.lineTo(-20,30); ctx.lineTo(-50,20); ctx.lineTo(-40,-10); ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Healthbar Boss
    let hr = Math.max(0, boss.hp/boss.maxHp);
    ctx.fillStyle = '#330000'; ctx.fillRect(-40, 45, 80, 6);
    ctx.fillStyle = '#ffaa00'; ctx.fillRect(-40, 45, 80 * hr, 6);
    ctx.restore();
  }

  // Draw Players
  if(player2.active) drawShip(player2.x, player2.y, false, true, player2.name);
  if(state !== 'gameover') {
    let sx = player.shake>0 ? (Math.random()-.5)*10 : 0;
    drawShip(player.x + sx, player.y, player.invincible>0, false, playerName);
  }

  // Resume Countdown Overlay
  if(state === 'resuming') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00f0ff'; ctx.font = 'bold 80px Orbitron'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 20;
    let sec = Math.ceil(resumeTimer / 60);
    ctx.fillText(sec, W/2, H/2);
    ctx.shadowBlur = 0; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  updateHUD();
}

function drawShip(x, y, inv, isP2, name) {
  if(inv && Math.floor(frame/5)%2===0) return;
  ctx.save(); ctx.translate(x, y);
  let cMain = isP2 ? '#44ffaa' : '#00f0ff';
  let cWing = isP2 ? '#004422' : '#002255';
  
  ctx.shadowColor = cMain; ctx.shadowBlur = 15;
  ctx.fillStyle = cWing; ctx.strokeStyle = cMain; ctx.lineWidth = 2;
  
  // Body
  ctx.beginPath(); ctx.moveTo(0,-20); ctx.lineTo(15,10); ctx.lineTo(8,15); ctx.lineTo(-8,15); ctx.lineTo(-15,10); ctx.closePath();
  ctx.fill(); ctx.stroke();
  
  // Core
  ctx.fillStyle = cMain; ctx.beginPath(); ctx.moveTo(0,-5); ctx.lineTo(5,8); ctx.lineTo(-5,8); ctx.closePath(); ctx.fill();

  // Engine Flame
  let fl = 0.5 + Math.random()*0.5;
  ctx.fillStyle = '#ffaa00'; ctx.shadowColor = '#ff4400';
  ctx.beginPath(); ctx.moveTo(-6,15); ctx.lineTo(0,15 + 15*fl); ctx.lineTo(6,15); ctx.closePath(); ctx.fill();

  // Name Tag
  ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '10px Rajdhani'; ctx.textAlign = 'center';
  ctx.fillText(name, 0, 30);
  
  ctx.restore();
}

function updateHUD() {
  document.getElementById('hudScore').innerText = `SCORE: ${score}`;
  document.getElementById('hudLv').innerText = `LV ${level}`;
  let heartStr = ""; for(let i=0;i<lives;i++) heartStr += "❤️";
  document.getElementById('hudLives').innerText = heartStr;
}

// --- Inputs ---
function bindBtn(id, key){
  const el = document.getElementById(id);
  const press = (e) => { e.preventDefault(); keys[key]=true; el.style.transform='scale(0.9)'; };
  const release = (e) => { e.preventDefault(); keys[key]=false; el.style.transform='scale(1)'; };
  el.addEventListener('touchstart', press, {passive:false});
  el.addEventListener('mousedown', press);
  el.addEventListener('touchend', release, {passive:false});
  el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}
bindBtn('btnLeft', 'left'); bindBtn('btnRight', 'right');

document.getElementById('btnPause').addEventListener('click', () => {
  if(state === 'playing') triggerPause();
});

document.addEventListener('keydown', e => {
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
});
document.addEventListener('keyup', e => {
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});

// Bootstrap Loop
function loop(){ update(); draw(); requestAnimationFrame(loop); }
initUI(); loop();

</script>
</body>
