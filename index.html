<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Defender V4 - Multiplayer, FX & Custom UI</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --cyan: #00f0ff;
      --pink: #ff4466;
      --yellow: #ffaa00;
      --bg-dark: #05050a;
      --glass-bg: rgba(10, 15, 30, 0.7);
      --glass-border: rgba(0, 240, 255, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    body {
      background: var(--bg-dark);
      display: flex; justify-content: center; align-items: center;
      height: 100vh; height: 100dvh; /* 100dvh for better mobile browser support */
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      touch-action: none; /* Prevent all browser zooming/scrolling */
    }

    #gw {
      background: #000008;
      overflow: hidden; display: flex; flex-direction: column;
      width: 100vw; height: 100%; max-width: 660px;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 240, 255, 0.1);
    }

    #gameCanvas {
      display: block; width: 100%; flex-grow: 1;
      image-rendering: pixelated; z-index: 1;
    }

    /* --- UI OVERLAYS (Glassmorphism) --- */
    .overlay-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 5, 15, 0.85);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 30;
    }

    .title-main { font-size: 48px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); font-weight: 900; letter-spacing: 2px;}
    .title-sub { font-size: 24px; color: var(--pink); text-shadow: 0 0 15px var(--pink); margin-bottom: 40px; letter-spacing: 4px; }

    .neon-btn {
      background: rgba(0, 240, 255, 0.05);
      border: 2px solid var(--cyan); color: var(--cyan);
      padding: 15px 40px; font-size: 16px; font-family: 'Orbitron', sans-serif; font-weight: 700;
      border-radius: 8px; margin: 10px; cursor: pointer; width: 280px;
      transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px;
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2) inset, 0 0 20px rgba(0, 240, 255, 0.1);
    }

    .neon-btn:hover, .neon-btn:active {
      background: var(--cyan); color: #000; box-shadow: 0 0 25px var(--cyan);
    }
    
    .neon-btn.multi { border-color: var(--yellow); color: var(--yellow); box-shadow: 0 0 15px rgba(255, 170, 0, 0.2) inset; }
    .neon-btn.multi:hover, .neon-btn.multi:active { background: var(--yellow); color: #000; box-shadow: 0 0 25px var(--yellow); }
    
    .neon-btn.danger { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 15px rgba(255, 68, 102, 0.2) inset; }
    .neon-btn.danger:hover, .neon-btn.danger:active { background: var(--pink); color: #fff; box-shadow: 0 0 25px var(--pink); }

    /* --- HUD & CONTROLS --- */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 15px 20px; z-index: 10; pointer-events: none;
      background: linear-gradient(to bottom, rgba(0,0,15,0.9) 0%, transparent 100%);
    }

    .hud-stat { font-size: 16px; font-weight: 700; text-shadow: 0 0 8px currentColor; margin-bottom: 5px;}
    
    #btnPause {
      pointer-events: auto; background: var(--glass-bg); border: 2px solid var(--cyan);
      color: var(--cyan); width: 40px; height: 40px; border-radius: 8px;
      display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer;
      backdrop-filter: blur(5px);
    }

    /* Customizable Mobile Pad */
    #padContainer {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 20;
    }

    .btn-steer {
      position: absolute; pointer-events: auto;
      background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: bold; cursor: pointer;
      backdrop-filter: blur(4px); transition: border-color 0.1s, color 0.1s;
    }

    .btn-steer:active, .btn-steer.pressed {
      background: rgba(0, 240, 255, 0.2); border-color: var(--cyan); color: var(--cyan);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.4) inset;
    }

    /* Settings Menu Customization */
    .settings-group { margin: 15px 0; width: 280px; text-align: left; color: #fff; font-size: 12px; }
    .settings-group label { display: block; margin-bottom: 5px; color: var(--cyan); }
    input[type=range] { width: 100%; accent-color: var(--cyan); }

    .spinner {
      width: 50px; height: 50px; border: 4px solid rgba(255, 170, 0, 0.2);
      border-top-color: var(--yellow); border-radius: 50%;
      animation: spin 1s linear infinite; margin-bottom: 20px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<audio id="bgmAudio" loop>
  <source src="https://opengameart.org/sites/default/files/Space%20Boss%20Battle%20Theme.mp3" type="audio/mpeg">
</audio>

<div id="gw">
  <div id="hud" style="display:none;">
    <div>
      <div class="hud-stat" id="hudScore" style="color:var(--cyan);">SCORE: 0</div>
      <div class="hud-stat" id="hudLives" style="color:var(--pink);">▲ x10</div>
    </div>
    <div class="hud-stat" id="hudLv" style="color:var(--yellow); font-size: 20px;">LV 1</div>
    <div id="btnPause" onclick="togglePause()">⏸</div>
  </div>

  <div id="padContainer" style="display:none;">
    <div class="btn-steer" id="btnLeft">&#9664;</div>
    <div class="btn-steer" id="btnRight">&#9654;</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="mainMenu" class="overlay-panel">
    <div class="title-main">COSMIC</div>
    <div class="title-sub">DEFENDER</div>
    <button class="neon-btn" onclick="startSequence('solo')">Solo Mission</button>
    <button class="neon-btn multi" onclick="startSequence('multi')">Co-Op Network</button>
    <button class="neon-btn" style="border-color:#44ffaa; color:#44ffaa;" onclick="togglePanel('leaderboardPanel')">Leaderboards</button>
    <button class="neon-btn" style="border-color:#aaa; color:#aaa; font-size: 14px;" onclick="togglePanel('settingsPanel')">⚙ UI Settings</button>
  </div>

  <div id="matchmakingPanel" class="overlay-panel" style="display:none; background: rgba(0,5,15,0.95);">
    <div class="spinner"></div>
    <h2 style="color:var(--yellow);">Establishing Link...</h2>
    <p id="matchStatus" style="margin-top: 15px; color: #aaa; font-size: 14px;">Connecting to Supabase Relay...</p>
    <button class="neon-btn danger" style="margin-top: 40px; width: auto; font-size: 14px;" onclick="cancelMatchmaking()">Abort Link</button>
  </div>

  <div id="pausePanel" class="overlay-panel" style="display:none; background: rgba(0,0,0,0.8);">
    <h1 style="color:var(--cyan); margin-bottom:30px;" id="pauseTitle">SYSTEM PAUSED</h1>
    <p id="pauseSubtitle" style="color:#fff; margin-bottom: 20px; font-size: 14px;"></p>
    <button class="neon-btn" onclick="resumeGame()">Resume Operations</button>
    <button class="neon-btn danger" onclick="quitGame()">Abort Mission</button>
  </div>

  <div id="leaderboardPanel" class="overlay-panel" style="display:none;">
    <h2 style="color:var(--yellow); margin-bottom:20px;">HALL OF FAME</h2>
    <div id="lbList" style="width: 80%; max-width: 300px; max-height: 50vh; overflow-y:auto; font-size: 16px; line-height: 2.5; color:#fff;"></div>
    <button class="neon-btn" style="margin-top:20px;" onclick="togglePanel('mainMenu')">Back to Command</button>
  </div>

  <div id="settingsPanel" class="overlay-panel" style="display:none;">
    <h2 style="color:#fff; margin-bottom:10px;">HUD CALIBRATION</h2>
    
    <div class="settings-group">
      <label>Button Size (Scale)</label>
      <input type="range" id="ctrlSize" min="60" max="150" value="90" oninput="applyControls()">
    </div>
    <div class="settings-group">
      <label>Vertical Position (Bottom Offset)</label>
      <input type="range" id="ctrlY" min="10" max="250" value="30" oninput="applyControls()">
    </div>
    <div class="settings-group">
      <label>Horizontal Spread (Side Margin)</label>
      <input type="range" id="ctrlX" min="5" max="100" value="15" oninput="applyControls()">
    </div>

    <button class="neon-btn" style="margin-top:30px;" onclick="saveControls()">Apply & Close</button>
  </div>
</div>

<script>
// ==========================================
// 1. SUPABASE CONFIG & MATCHMAKING
// ==========================================
const SUPABASE_URL = 'https://blvfsbsgtbvnuaisglmz.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_uI4hO-j7K8QWim1fVGQvSw_IrKtp1kP'; 

let supabaseClient = null;
let lobbyChannel = null;
let gameChannel = null;
const myPlayerId = Math.random().toString(36).substring(2, 10);
let isHost = false;

try {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
} catch (e) {
  console.warn("Supabase Error. Multiplayer will fallback to local demo.");
}

// ==========================================
// 2. GAME STATE & VARIABLES
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = canvas.width = canvas.offsetWidth;
let H = canvas.height = canvas.offsetHeight;

let state = 'menu'; // menu, matchmaking, intro, playing, paused, countdown, gameover, levelclear
let score = 0, lives = 10, level = 1, frame = 0;
const keys = {left:false, right:false};
let gameMode = 'solo'; 

const player = {x:W/2, y:H+100, invincible:0, shake:0, speed:7}; 
const player2 = {x:W/2, y:H-160, active:false, color:'#44ffaa'}; 

const bullets=[], eBullets=[], enemies=[], parts=[], stars=[], shockwaves=[];
let shotCD=0, eShootT=0, bossActive=false, boss=null, levelClearT=0;
let pauseCountdown = 0;

const bgm = document.getElementById('bgmAudio');
bgm.volume = 0.3;

let leaderboards = JSON.parse(localStorage.getItem('cosmic_lb')) || [
  {name: 'Maverick', score: 5000}, {name: 'Goose', score: 3200}
];

window.addEventListener('resize', () => {
  W = canvas.width = canvas.offsetWidth;
  H = canvas.height = canvas.offsetHeight;
});

// ==========================================
// 3. AUDIO ENGINE (Upgraded SFX)
// ==========================================
let audioCtx = null;
function initAudio() {
  if(!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
}

function playSFX(type) {
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);

  const t = audioCtx.currentTime;
  if(type === 'shoot') {
    o.type = 'square';
    o.frequency.setValueAtTime(800 + level*10, t);
    o.frequency.exponentialRampToValueAtTime(300, t + 0.1);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    o.start(t); o.stop(t + 0.1);
  } 
  else if(type === 'hit') {
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, t);
    o.frequency.exponentialRampToValueAtTime(50, t + 0.15);
    g.gain.setValueAtTime(0.1, t);
    g.gain.linearRampToValueAtTime(0.001, t + 0.15);
    o.start(t); o.stop(t + 0.15);
  }
  else if(type === 'explode') {
    // Low rumble for explosion
    o.type = 'triangle';
    o.frequency.setValueAtTime(100, t);
    o.frequency.exponentialRampToValueAtTime(20, t + 0.4);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    o.start(t); o.stop(t + 0.4);
  }
}

// ==========================================
// 4. CUSTOM CONTROLS MANAGER
// ==========================================
let ctrlCfg = JSON.parse(localStorage.getItem('cosmic_cfg')) || { size: 90, y: 30, x: 15 };

function initControls() {
  document.getElementById('ctrlSize').value = ctrlCfg.size;
  document.getElementById('ctrlY').value = ctrlCfg.y;
  document.getElementById('ctrlX').value = ctrlCfg.x;
  applyControls();
}

function applyControls() {
  const size = document.getElementById('ctrlSize').value;
  const yOffset = document.getElementById('ctrlY').value;
  const xSpread = document.getElementById('ctrlX').value;
  
  const btnL = document.getElementById('btnLeft');
  const btnR = document.getElementById('btnRight');
  
  // Apply CSS
  const css = `width:${size}px; height:${size}px; bottom:${yOffset}px;`;
  btnL.style.cssText = css + `left:${xSpread}px;`;
  btnR.style.cssText = css + `right:${xSpread}px;`;
}

function saveControls() {
  ctrlCfg = {
    size: document.getElementById('ctrlSize').value,
    y: document.getElementById('ctrlY').value,
    x: document.getElementById('ctrlX').value
  };
  localStorage.setItem('cosmic_cfg', JSON.stringify(ctrlCfg));
  togglePanel('mainMenu');
}

// ==========================================
// 5. UI PANEL ROUTING
// ==========================================
function togglePanel(panelId) {
  const panels = ['mainMenu', 'matchmakingPanel', 'pausePanel', 'leaderboardPanel', 'settingsPanel'];
  panels.forEach(p => document.getElementById(p).style.display = 'none');
  
  if(panelId === 'leaderboardPanel') {
    let html = '';
    leaderboards.forEach((l, i) => {
      html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #333; padding:8px 0;">
                <span><span style="color:#555">${i+1}.</span> ${l.name}</span> <span style="color:var(--cyan)">${l.score}</span>
               </div>`;
    });
    document.getElementById('lbList').innerHTML = html;
  }
  document.getElementById(panelId).style.display = 'flex';
}

// ==========================================
// 6. MULTIPLAYER MATCHMAKING LOGIC
// ==========================================
function startSequence(mode) {
  initAudio();
  gameMode = mode;
  bgm.play().catch(() => console.log("BGM pending interaction"));

  if(mode === 'multi') {
    if(!supabaseClient) { alert("Supabase failed. Playing Solo."); return startSequence('solo'); }
    
    togglePanel('matchmakingPanel');
    document.getElementById('matchStatus').innerText = "Joining Global Lobby...";
    
    // 1. Join Global Lobby to find a peer
    lobbyChannel = supabaseClient.channel('cosmic-lobby', { config: { broadcast: { self: false } }});
    
    lobbyChannel
      .on('broadcast', { event: 'looking' }, (payload) => {
        // Someone is looking! I will host the room.
        if(state === 'matchmaking') {
          isHost = true;
          const roomId = 'room-' + myPlayerId;
          document.getElementById('matchStatus').innerText = "Pilot Found! Generating Sector...";
          lobbyChannel.send({ type: 'broadcast', event: 'found', payload: { to: payload.payload.id, room: roomId } });
          setTimeout(() => enterGameRoom(roomId), 1000);
        }
      })
      .on('broadcast', { event: 'found' }, (payload) => {
        // I was invited to a room!
        if(state === 'matchmaking' && payload.payload.to === myPlayerId) {
          isHost = false;
          document.getElementById('matchStatus').innerText = "Sector Coordinates Received...";
          setTimeout(() => enterGameRoom(payload.payload.room), 1000);
        }
      })
      .subscribe((status) => {
        if(status === 'SUBSCRIBED') {
          state = 'matchmaking';
          document.getElementById('matchStatus').innerText = "Broadcasting signal...";
          // Broadcast presence
          lobbyChannel.send({ type: 'broadcast', event: 'looking', payload: { id: myPlayerId } });
        }
      });
  } else {
    togglePanel(''); // Hide all panels
    initGame();
  }
}

function enterGameRoom(roomId) {
  if(lobbyChannel) supabaseClient.removeChannel(lobbyChannel);
  
  gameChannel = supabaseClient.channel(roomId, { config: { broadcast: { self: false } }});
  gameChannel
    .on('broadcast', { event: 'sync' }, (payload) => {
      // Sync basic inputs and shooting
      player2.x = payload.payload.x;
      player2.active = true;
      if(payload.payload.shoot) {
        bullets.push({x: player2.x, y: player2.y-20, vy: -12, col: '#44ffaa'});
        playSFX('shoot');
      }
    })
    .on('broadcast', { event: 'pause' }, () => triggerPause(false)) // Remote pause
    .on('broadcast', { event: 'resume' }, () => triggerResume(false)) // Remote resume
    .subscribe((status) => {
      if(status === 'SUBSCRIBED') {
        togglePanel('');
        initGame();
      }
    });
}

function cancelMatchmaking() {
  state = 'menu';
  if(lobbyChannel) supabaseClient.removeChannel(lobbyChannel);
  if(gameChannel) supabaseClient.removeChannel(gameChannel);
  togglePanel('mainMenu');
}

// ==========================================
// 7. PAUSE SYSTEM
// ==========================================
function togglePause() {
  if(state === 'playing') triggerPause(true);
}

function triggerPause(isLocal) {
  if(state !== 'playing') return;
  
  if(gameMode === 'multi' && isLocal && gameChannel) {
    gameChannel.send({ type: 'broadcast', event: 'pause' });
  }
  
  state = 'paused';
  bgm.pause();
  togglePanel('pausePanel');
  document.getElementById('pauseTitle').innerText = "SYSTEM PAUSED";
  document.getElementById('pauseSubtitle').innerText = isLocal ? "Awaiting your command." : "Co-op partner halted the game.";
}

function resumeGame() {
  triggerResume(true);
}

function triggerResume(isLocal) {
  if(state !== 'paused') return;

  if(gameMode === 'multi') {
    if(isLocal && gameChannel) gameChannel.send({ type: 'broadcast', event: 'resume' });
    state = 'countdown';
    pauseCountdown = 180; // 3 seconds at 60fps
    togglePanel('pausePanel');
    document.getElementById('pauseTitle').innerText = "RESUMING...";
  } else {
    // Single player immediate resume
    state = 'playing';
    bgm.play();
    togglePanel('');
  }
}

function quitGame() {
  cancelMatchmaking();
  document.getElementById('hud').style.display = 'none';
  document.getElementById('padContainer').style.display = 'none';
  bgm.pause(); bgm.currentTime = 0;
}

// ==========================================
// 8. GAMEPLAY & RENDERING
// ==========================================
function initGame() {
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('padContainer').style.display = 'block';
  
  score=0; lives=10; level=1; player.x=W/2; player.y=H+100; player.invincible=0;
  player2.active = false;
  bullets.length=0; eBullets.length=0; parts.length=0; shockwaves.length=0; bossActive=false; boss=null;
  state = 'intro';
}

function spawnParts(x, y, col, n=15, isBig=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28;
    const speed = isBig ? Math.random()*8+3 : Math.random()*4+1;
    parts.push({
      x: x, y: y, vx: Math.cos(a)*speed, vy: Math.sin(a)*speed, 
      life: 1, dec: 0.02+Math.random()*0.03, 
      r: isBig ? Math.random()*5+2 : Math.random()*3+1, col: col
    });
  }
  shockwaves.push({ x: x, y: y, r: 5, maxR: isBig ? 100 : 40, alpha: 1, col: col, speed: isBig ? 6 : 3 });
}

function spawnEnemies(){
  enemies.length=0; eBullets.length=0;
  const rows=Math.min(2+Math.floor(level/2),5), cols=Math.min(5+level,8);
  const startX = W/2 - ((cols-1)*50)/2;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    enemies.push({x:startX+c*50, y:40+r*45, hp:(level>4)?2:1, color:EC[(r+level)%EC.length], dir:1, t:Math.random()*6.28});
  }
}

function spawnBoss(){
  bossActive=true;
  boss={x:W/2,y:80,hp:40+level*8,maxHp:40+level*8,dx:2.5,dir:1,t:0,st:0};
}

function gameOver(){
  state='gameover';
  bgm.pause(); bgm.currentTime = 0;
  spawnParts(player.x,player.y,'#ff4466',50, true);
  playSFX('explode');
  
  if(gameChannel) { gameChannel.unsubscribe(); gameChannel = null; }
  
  setTimeout(() => {
    const name = prompt("Game Over! Enter your Callsign:", "Pilot");
    if(name) {
      leaderboards.push({name: name.substring(0,10), score: score});
      leaderboards.sort((a,b) => b.score - a.score);
      leaderboards = leaderboards.slice(0, 10);
      localStorage.setItem('cosmic_lb', JSON.stringify(leaderboards));
    }
    document.getElementById('hud').style.display = 'none';
    document.getElementById('padContainer').style.display = 'none';
    togglePanel('mainMenu');
  }, 2500);
}

// Main Update Loop
function update(){
  frame++;
  
  if(state === 'paused' || state === 'matchmaking' || state === 'menu') return;

  if(state === 'countdown') {
    pauseCountdown--;
    if(pauseCountdown <= 0) {
      state = 'playing';
      bgm.play();
      togglePanel('');
    }
    return;
  }

  updateParticles();

  if(state === 'intro') {
    player.y -= 4; 
    if(player.y <= H - 120) {
      player.y = H - 120;
      state = 'playing';
      spawnEnemies();
    }
    return;
  }

  if(state==='gameover') return;

  if(state==='levelclear'){
    levelClearT++;
    player.y -= 2; 
    if(levelClearT>=100){
      level++; player.y = H-120;
      if(level%5===0) spawnBoss(); else spawnEnemies();
      state='playing'; levelClearT=0;
    }
    return;
  }

  // Input Movement
  let moved = false; let fired = false;
  if(keys.left) { player.x=Math.max(20,player.x-player.speed); moved=true; }
  if(keys.right) { player.x=Math.min(W-20,player.x+player.speed); moved=true; }

  // Auto Shoot
  if(shotCD<=0){
    let bCol = level >= 5 ? '#ffaa00' : '#00f0ff';
    if(level < 3) {
      bullets.push({x:player.x, y:player.y-20, vy:-12, col:bCol});
    } else if (level < 6) { 
      bullets.push({x:player.x-10, y:player.y-10, vy:-13, col:bCol});
      bullets.push({x:player.x+10, y:player.y-10, vy:-13, col:bCol});
    } else { 
      bullets.push({x:player.x, y:player.y-25, vy:-14, col:bCol});
      bullets.push({x:player.x-15, y:player.y-10, vy:-12, vx:-2, col:'#ff4466'});
      bullets.push({x:player.x+15, y:player.y-10, vy:-12, vx:2, col:'#ff4466'});
    }
    fired = true;
    shotCD = Math.max(6, 12 - Math.floor(level/3)); 
    playSFX('shoot');
  }
  if(shotCD>0) shotCD--;

  // Sync Multiplayer (Throttle broadcast to avoid flooding)
  if(gameMode === 'multi' && gameChannel && (moved || fired) && frame % 2 === 0) {
    gameChannel.send({ type: 'broadcast', event: 'sync', payload: { x: player.x, shoot: fired } });
  }

  bullets.forEach(b=>{ b.y+=b.vy; if(b.vx)b.x+=b.vx; });
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].y<-10) bullets.splice(i,1);
  if(player.invincible>0)player.invincible--;

  // ENEMY LOGIC (BUG 1 FIX: Speed Capping)
  if(!bossActive){
    const totalEnemies = Math.max(1, (2+Math.floor(level/2))*(5+level));
    // Calculate speed based on level, but cap the base modifier.
    const baseSpd = 1 + Math.min(level * 0.1, 1.5); 
    // Increase speed slightly when fewer enemies left, cap at +0.8
    const missingBonus = (1 - (enemies.length / totalEnemies)) * 0.8;
    const spd = baseSpd + missingBonus;
    
    let edge=false;
    enemies.forEach(e=>{
      e.x += (1.5) * e.dir * spd; // Fixed dx step for smooth scaling
      e.t+=0.05;
      if(e.x>W-25||e.x<25)edge=true;
    });
    
    // Drop logic (Cap the drop height so they don't instakill)
    if(edge) {
      enemies.forEach(e=>{
        e.dir*=-1; 
        e.y += 15 + Math.min(level * 1.5, 15); // Max drop distance is 30px per bounce
      });
    }
    
    enemies.forEach(e=>{if(e.y>player.y-30&&player.invincible<=0){
      lives--;player.invincible=60;player.shake=15;
      spawnParts(player.x,player.y,'#ff4466',25, true); playSFX('hit');
      if(lives<=0)gameOver();
    }});

    eShootT++;
    const sr=Math.max(25,70-level*3); // Shoot rate
    if(eShootT>=sr&&enemies.length>0){
      eShootT=0;
      const sh=enemies[Math.floor(Math.random()*enemies.length)];
      eBullets.push({x:sh.x,y:sh.y+15,vy:4+Math.min(level*0.4, 6)}); // Cap bullet speed too
    }
    if(enemies.length===0){
      state='levelclear';levelClearT=0;
    }
  } else if(boss){
    boss.t+=0.04;boss.x+=boss.dx*boss.dir;
    if(boss.x>W-70||boss.x<70)boss.dir*=-1;
    boss.y=80+Math.sin(boss.t)*30;
    boss.st++;
    
    const br=Math.max(20, 50-level*2);
    if(boss.st>=br){
      boss.st=0;
      for(let a=-2;a<=2;a+=2) eBullets.push({x:boss.x+a*15,y:boss.y+40,vy:5+Math.min(level*0.2, 3),vx:a*1.2});
    }
    if(boss.hp<=0){
      spawnParts(boss.x,boss.y,'#ff4466',60, true);spawnParts(boss.x,boss.y,'#ffff00',40, true);
      score+=1000+level*200;bossActive=false;boss=null; playSFX('explode');
      state='levelclear';levelClearT=0;
    }
  }

  // Hit Detection (Musuh -> Player)
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    b.y+=b.vy;if(b.vx)b.x+=b.vx;
    if(b.y>H+10){eBullets.splice(i,1);continue;}
    if(player.invincible<=0&&Math.abs(b.x-player.x)<16&&Math.abs(b.y-player.y)<18){
      lives--;player.invincible=60;player.shake=20;
      spawnParts(player.x,player.y,'#00f0ff',30, true);eBullets.splice(i,1);
      playSFX('hit'); if(lives<=0)gameOver();
    }
  }

  // Hit Detection (Peluru -> Musuh)
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];let hit=false;
    if(bossActive&&boss&&Math.abs(b.x-boss.x)<50&&Math.abs(b.y-boss.y)<35){
      boss.hp--;hit=true;spawnParts(b.x,b.y,'#ffaa00',10);score+=20;playSFX('hit');
    }
    for(let j=enemies.length-1;j>=0&&!hit;j--){
      const e=enemies[j];
      if(Math.abs(b.x-e.x)<20&&Math.abs(b.y-e.y)<18){
        e.hp--;hit=true;
        if(e.hp<=0){
          spawnParts(e.x,e.y,e.color,20, true); 
          enemies.splice(j,1);score+=20+level*5;playSFX('explode');
        } else {
          spawnParts(e.x,e.y,e.color,8);playSFX('hit');
        }
      }
    }
    if(hit)bullets.splice(i,1);
  }
}

function updateParticles() {
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; 
    p.vx *= 0.92; p.vy *= 0.92; // Smooth friction
    p.life-=p.dec;
    if(p.life<=0)parts.splice(i,1);
  }
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];
    sw.r += sw.speed;
    sw.alpha -= 0.05;
    if(sw.alpha<=0) shockwaves.splice(i,1);
  }
}

// RENDERING
function draw(){
  ctx.fillStyle='var(--bg-dark)';ctx.fillRect(0,0,W,H);
  
  // Stars
  stars.forEach(s=>{
    const b=0.3+s.b*0.7+Math.sin(frame*0.04+s.b*9)*0.2;
    ctx.fillStyle=`rgba(255,255,255,${b})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();
    s.y+=s.spd * (state==='intro'? 4 : 0.8); 
    if(s.y>H){s.y=0;s.x=Math.random()*W;}
  });

  if(state==='menu' || state==='matchmaking') return;

  // Effects
  ctx.lineWidth = 3;
  shockwaves.forEach(sw => {
    ctx.save(); ctx.globalAlpha = Math.max(0, sw.alpha);
    ctx.strokeStyle = sw.col; ctx.shadowColor = sw.col; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  });

  parts.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.max(0, p.life);ctx.shadowColor=p.col;ctx.shadowBlur=15;
    ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,6.28);ctx.fill();ctx.restore();
  });

  // Entities
  bullets.forEach(b=>{
    ctx.save(); ctx.shadowColor=b.col; ctx.shadowBlur=10; ctx.fillStyle=b.col;
    ctx.beginPath(); ctx.roundRect(b.x-3,b.y-8,6,16,4); ctx.fill(); ctx.restore();
  });
  eBullets.forEach(b=>{
    ctx.save(); ctx.shadowColor='#ff4444'; ctx.shadowBlur=10; ctx.fillStyle='#ff4444';
    ctx.beginPath(); ctx.arc(b.x,b.y,5,0,6.28); ctx.fill(); ctx.restore();
  });
  
  if(!bossActive) enemies.forEach(e=>{
    ctx.save();ctx.translate(e.x,e.y);
    ctx.shadowColor=e.color;ctx.shadowBlur=15;
    const p=0.9+Math.sin(e.t)*0.1;ctx.scale(p,p);
    ctx.strokeStyle=e.color;ctx.lineWidth=2;ctx.fillStyle=e.color+'44';
    ctx.beginPath();ctx.moveTo(0,-12);ctx.lineTo(-12,-4);ctx.lineTo(-15,8);ctx.lineTo(-6,12);ctx.lineTo(6,12);ctx.lineTo(15,8);ctx.lineTo(12,-4);ctx.closePath();
    ctx.fill();ctx.stroke();
    ctx.fillStyle=e.color; ctx.beginPath();ctx.arc(-6,3,3,0,6.28);ctx.fill(); ctx.beginPath();ctx.arc(6,3,3,0,6.28);ctx.fill();
    ctx.restore();
  });
  
  if(bossActive&&boss) {
    ctx.save();ctx.translate(boss.x,boss.y);
    const p=0.95+Math.sin(boss.t*2)*0.05;ctx.scale(p,p);
    ctx.shadowColor='#ff4466';ctx.shadowBlur=30;
    ctx.strokeStyle='#ff4466';ctx.fillStyle='#220011';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,-35);ctx.lineTo(-45,-15);ctx.lineTo(-50,25);ctx.lineTo(-25,35);ctx.lineTo(25,35);ctx.lineTo(50,25);ctx.lineTo(45,-15);ctx.closePath();
    ctx.fill();ctx.stroke();
    const hr=boss.hp/boss.maxHp;
    ctx.fillStyle='#ff000044';ctx.fillRect(-45,45,90,8);
    ctx.fillStyle=`hsl(${hr*120},100%,55%)`;ctx.fillRect(-45,45,90*hr,8);
    ctx.restore();
  }

  // Players
  if(state !== 'gameover') {
    if(gameMode === 'multi' && player2.active) {
      drawShip(player2.x, player2.y, false, true);
    }
    const sx=player.shake>0?(Math.random()-.5)*player.shake*.5:0;
    const sy=player.shake>0?(Math.random()-.5)*player.shake*.3:0;
    if(player.shake>0)player.shake--;
    drawShip(player.x+sx,player.y+sy,player.invincible>0, false);
  }
  
  // HUD Update
  document.getElementById('hudScore').textContent=`SCORE: ${score}`;
  document.getElementById('hudLv').textContent=`LV ${level}`;
  document.getElementById('hudLives').textContent=`▲ x${lives}`;

  // Overlays Contextual Rendering
  if(state === 'countdown') {
    ctx.fillStyle='rgba(0,0,20,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.font='bold 60px Orbitron'; ctx.fillStyle='var(--cyan)'; ctx.shadowColor='var(--cyan)'; ctx.shadowBlur=20;
    ctx.fillText(Math.ceil(pauseCountdown/60),W/2,H/2);
  }
}

// BINDINGS
function bindBtn(id,key){
  const el=document.getElementById(id);
  ['pointerdown','touchstart'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=true; initAudio();},{passive:false}));
  ['pointerup','touchend','pointerleave','touchcancel'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=false;},{passive:false}));
}
bindBtn('btnLeft','left');bindBtn('btnRight','right');

document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=true;
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')keys.right=false;
});

initStars();
initControls(); // Apply saved button positions
function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
</body>
