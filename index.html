<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Cosmic Defender V10 - The Final Polish</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --btn-size: 80px;
      --btn-gap: 20px;
      --btn-bottom: 30px;
    }

    * {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    body {
      background: #050505; display: flex; justify-content: center; align-items: center;
      height: 100vh; height: 100dvh; overflow: hidden;
      font-family: monospace; touch-action: none;
    }

    #gw {
      background: #000010; position: relative;
      width: 100vw; height: 100vh; height: 100dvh; max-width: 660px;
      box-shadow: 0 0 30px rgba(0, 240, 255, 0.15); overflow: hidden;
    }

    canvas {
      display: block; width: 100%; height: 100%; image-rendering: pixelated;
    }

    /* NEON PANELS UI */
    .overlay-panel {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 16, 0.85); backdrop-filter: blur(4px);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 50; transition: opacity 0.3s;
    }
    .hidden { display: none !important; opacity: 0; pointer-events: none; }

    .title-main { font-size: 44px; color: #00f0ff; text-shadow: 0 0 25px #00f0ff; margin-bottom: 5px; font-weight: bold;}
    .title-sub { font-size: 26px; color: #ff4466; text-shadow: 0 0 20px #ff4466; margin-bottom: 40px; }

    .menu-btn {
      background: rgba(0,0,0,0.5); border: 2px solid #00f0ff; color: #00f0ff;
      padding: 15px 40px; font-size: 18px; font-family: monospace; font-weight: bold;
      border-radius: 8px; margin: 10px; cursor: pointer; width: 280px;
      transition: 0.2s; text-transform: uppercase; box-shadow: 0 0 10px rgba(0, 240, 255, 0.2) inset;
    }
    .menu-btn:hover, .menu-btn:active { background: #00f0ff; color: #000; box-shadow: 0 0 20px #00f0ff; }
    .menu-btn.multi { border-color: #ffaa00; color: #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.2) inset; }
    .menu-btn.multi:hover, .menu-btn.multi:active { background: #ffaa00; color: #000; box-shadow: 0 0 20px #ffaa00; }
    .menu-btn.danger { border-color: #ff4466; color: #ff4466; }
    .menu-btn.danger:hover { background: #ff4466; color: #000; box-shadow: 0 0 20px #ff4466; }
    .menu-btn.gold { border-color: #ffd700; color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.2) inset; }
    .menu-btn.gold:hover, .menu-btn.gold:active { background: #ffd700; color: #000; box-shadow: 0 0 20px #ffd700; }

    .neon-input {
      background: transparent; border: 2px solid #00f0ff; color: #00f0ff;
      font-family: monospace; font-size: 20px; padding: 12px; margin-bottom: 20px;
      width: 280px; border-radius: 5px; text-align: center; outline: none;
      box-shadow: 0 0 10px rgba(0, 240, 255, 0.2) inset;
    }
    .neon-input:focus { box-shadow: 0 0 20px #00f0ff inset; }

    /* HUD & CONTROLS */
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 20px; background: linear-gradient(to bottom, rgba(0,0,40,0.9), transparent);
      z-index: 20; pointer-events: none;
    }
    .hud-txt { font-size: 16px; font-weight: bold; text-shadow: 0 0 5px currentColor; }
    
    #btnPause {
      pointer-events: auto; background: rgba(0,240,255,0.1); border: 2px solid #00f0ff;
      color: #00f0ff; width: 45px; height: 45px; border-radius: 8px;
      font-size: 18px; display: flex; justify-content: center; align-items: center;
      cursor: pointer; backdrop-filter: blur(5px); font-weight: bold;
    }

    #pad {
      position: absolute; bottom: var(--btn-bottom); left: 0; width: 100%;
      display: flex; justify-content: space-between; padding: 0 var(--btn-gap);
      z-index: 20; pointer-events: none;
    }
    .btn-steer {
      pointer-events: auto; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 15px;
      width: clamp(60px, var(--btn-size), 150px); height: clamp(60px, var(--btn-size), 150px);
      font-size: calc(var(--btn-size) * 0.3); display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(5px); transition: 0.1s;
    }
    .btn-steer:active {
      background: rgba(0, 240, 255, 0.2); border-color: rgba(0, 240, 255, 0.6);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.4) inset; transform: scale(0.95);
    }

    /* IN-GAME CHAT UI */
    #chatBox {
      position: absolute; top: 75px; left: 10px; width: 250px; z-index: 25; pointer-events: none;
      display: flex; flex-direction: column;
    }
    #chatLog {
      max-height: 120px; overflow-y: hidden; display: flex; flex-direction: column; justify-content: flex-end;
      font-size: 12px; text-shadow: 0 0 3px #000; margin-bottom: 5px; pointer-events: none;
    }
    .chat-msg {
      background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; margin-bottom: 2px;
      color: #fff; word-wrap: break-word; transition: opacity 0.5s; border-left: 2px solid #00f0ff;
    }
    #chatInput {
      pointer-events: auto; background: rgba(0,0,30,0.6); border: 1px solid rgba(0,240,255,0.5);
      color: #fff; font-family: monospace; font-size: 12px; padding: 6px 10px; border-radius: 4px;
      outline: none; width: 100%; backdrop-filter: blur(2px);
    }
    #chatInput:focus { border-color: #00f0ff; background: rgba(0,0,40,0.8); }

    /* LEADERBOARD TABLE */
    .lb-table { width: 100%; text-align: left; border-collapse: collapse; margin-top: 10px; }
    .lb-table th { color: #ffd700; border-bottom: 1px solid rgba(255,215,0,0.5); padding: 8px 0; }
    .lb-table td { color: #fff; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }

    /* CUSTOM ALERTS */
    #customAlert {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(255, 68, 102, 0.9); color: white; padding: 10px 25px;
      border-radius: 8px; font-weight: bold; z-index: 100;
      border: 1px solid #ff4466; box-shadow: 0 0 15px #ff4466;
      animation: slideDown 0.3s ease-out; font-family: monospace;
    }
    @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } }

    .spinner {
      width: 50px; height: 50px; border: 5px solid rgba(255, 170, 0, 0.3);
      border-top-color: #ffaa00; border-radius: 50%;
      animation: spin 1s linear infinite; margin: 0 auto 20px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<audio id="bgmAudio" loop><source src="https://opengameart.org/sites/default/files/Space%20Boss%20Battle%20Theme.mp3" type="audio/mpeg"></audio>
<audio id="bgmGame" loop><source src="https://opengameart.org/sites/default/files/bossa_nova_0.mp3" type="audio/mpeg"></audio>

<div id="gw">
  <canvas id="gameCanvas"></canvas>
  
  <div id="hud" class="hidden">
    <span class="hud-txt" id="hudScore" style="color:#00f0ff;">SCORE: 0</span>
    <div id="btnPause">||</div>
    <span class="hud-txt" id="hudLv" style="color:#ffff00;">LV 1</span>
    <span class="hud-txt" id="hudLives" style="color:#ff8844; font-size:20px;">▲ x3</span>
  </div>

  <div id="chatBox" class="hidden">
    <div id="chatLog"></div>
    <input type="text" id="chatInput" placeholder="Ketik lalu Enter..." maxlength="40">
  </div>
  
  <div id="pad" class="hidden">
    <div class="btn-steer" id="btnLeft">◀</div>
    <div class="btn-steer" id="btnRight">▶</div>
  </div>

  <div id="panelAuth" class="overlay-panel">
    <h2 style="color:#00f0ff; margin-bottom:15px; text-shadow: 0 0 10px #00f0ff;">CALLSIGN REGISTRATION</h2>
    <input type="text" id="inputName" class="neon-input" placeholder="ENTER NAME" maxlength="10">
    <button class="menu-btn" onclick="saveName()">CONNECT</button>
  </div>

  <div id="panelMenu" class="overlay-panel hidden">
    <div class="title-main">COSMIC</div>
    <div class="title-sub">DEFENDER</div>
    <div id="welcomeText" style="color:#fff; margin-bottom:15px; font-weight:bold;">Welcome, Pilot</div>
    <button class="menu-btn" onclick="startGame('solo')">SOLO START</button>
    <button class="menu-btn multi" onclick="startMatchmaking()">ONLINE MULTIPLAYER</button>
    <button class="menu-btn gold" onclick="fetchLeaderboard()">LEADERBOARD</button>
    <button class="menu-btn" style="border-color:#44ffaa; color:#44ffaa;" onclick="openSettings()">UI SETTINGS</button>
  </div>

  <div id="panelLobby" class="overlay-panel hidden">
    <h2 style="color:#ffaa00; margin-bottom:20px;">WARP GATE HUB</h2>
    <div class="spinner" id="lobbySpinner"></div>
    <div id="lobbyPlayers" style="margin-bottom: 20px; color: #fff; line-height: 2; font-size:18px;"></div>
    <p id="lobbyStatus" style="color:#44ffaa; font-weight:bold; margin-bottom:15px;">Mencari sektor kosong...</p>
    <button class="menu-btn danger" id="btnAbortLobby" onclick="leaveLobby()">ABORT</button>
  </div>

  <div id="panelLeaderboard" class="overlay-panel hidden">
    <h2 style="color:#ffd700; margin-bottom:10px; text-shadow: 0 0 15px #ffd700;">HALL OF FAME</h2>
    <p style="color:#aaa; font-size:12px; margin-bottom:20px;">Top 10 Galactic Defenders</p>
    <div id="lbContent" style="width: 300px; max-height: 300px; overflow-y:auto; margin-bottom: 20px;"></div>
    <button class="menu-btn" onclick="togglePanel('panelMenu')">BACK TO BASE</button>
  </div>

  <div id="panelSettings" class="overlay-panel hidden">
    <h2 style="color:#44ffaa; margin-bottom:20px;">SYSTEM SETTINGS</h2>
    
    <div style="text-align:left; color:#fff; margin-bottom: 15px; width: 280px;">
      <label>Sensitivity: <span id="valSens">1.0x</span></label>
      <input type="range" id="slSens" min="5" max="25" value="10" style="width:100%; margin-top:5px;">
    </div>
    <div style="text-align:left; color:#fff; margin-bottom: 15px; width: 280px;">
      <label>Button Size: <span id="valSize">80px</span></label>
      <input type="range" id="slSize" min="50" max="150" value="80" style="width:100%; margin-top:5px;">
    </div>
    <div style="text-align:left; color:#fff; margin-bottom: 15px; width: 280px;">
      <label>Side Gap: <span id="valGap">20px</span></label>
      <input type="range" id="slGap" min="0" max="100" value="20" style="width:100%; margin-top:5px;">
    </div>
    <div style="text-align:left; color:#fff; margin-bottom: 25px; width: 280px;">
      <label>Bottom Margin: <span id="valBot">30px</span></label>
      <input type="range" id="slBot" min="10" max="200" value="30" style="width:100%; margin-top:5px;">
    </div>
    
    <button class="menu-btn" onclick="closeSettings()">APPLY & CLOSE</button>
  </div>

  <div id="panelPause" class="overlay-panel hidden">
    <h1 style="color:#00f0ff; font-size:40px; margin-bottom:30px; text-shadow: 0 0 20px #00f0ff;">SYSTEM PAUSED</h1>
    <button class="menu-btn" onclick="triggerResume()">RESUME</button>
    <button class="menu-btn" style="border-color:#44ffaa; color:#44ffaa;" onclick="openSettings()">SETTINGS</button>
    <button class="menu-btn danger" onclick="quitGame()">QUIT GAME</button>
  </div>

</div>

<div id="customAlert" class="hidden">Message</div>

<script>
// ==========================================
// 1. GLOBAL VARIABLES & CONFIG
// ==========================================
let playerName = localStorage.getItem('cosmic_name') || "";
let gameMode = 'solo';
let state = 'auth'; 
let frame = 0;

// SUPABASE CONFIG
const SUPABASE_URL = 'https://blvfsbsgtbvnuaisglmz.supabase.co'; 
const SUPABASE_KEY = 'sb_publishable_uI4hO-j7K8QWim1fVGQvSw_IrKtp1kP'; 
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let roomChannel = null;
let roomIndex = 1; 
let amIHost = false; 
let isSyncingStart = false; // Flag untuk loading sinkron

// AUDIO
let audioCtx = null;
const bgmMenu = document.getElementById('bgmAudio'); bgmMenu.volume = 0.3;
const bgmGame = document.getElementById('bgmGame'); bgmGame.volume = 0.4;

// CANVAS
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }
window.addEventListener('resize', resize); resize();

const keys = {left:false, right:false};
let score = 0, lives = 3, level = 1, resumeTimer = 0;

// SENSITIVITY & MOVEMENT
let sensitivity = 1.0;
let baseSpeed = 11;
const player = {x:W/2, y:H+100, targetX:W/2, invincible:0, shake:0, speed: baseSpeed * sensitivity}; 
const player2 = {x:W/2, y:H-160, active:false, name:"P2", invincible:0, shake:0}; 

const bullets=[], eBullets=[], enemies=[], parts=[], stars=[], shockwaves=[];
let shotCD=0, eShootT=0, bossActive=false, boss=null, levelClearT=0;

// ==========================================
// 2. UI & AUDIO SYSTEM
// ==========================================
function showAlert(msg, isError=true) {
  const box = document.getElementById('customAlert');
  box.textContent = msg;
  box.style.borderColor = isError ? "#ff4466" : "#44ffaa";
  box.style.boxShadow = `0 0 15px ${isError ? "#ff4466" : "#44ffaa"}`;
  box.classList.remove('hidden');
  setTimeout(() => box.classList.add('hidden'), 3000);
}

function togglePanel(panelId) {
  document.querySelectorAll('.overlay-panel').forEach(p => p.classList.add('hidden'));
  if(panelId) document.getElementById(panelId).classList.remove('hidden');
}

function openSettings() { togglePanel('panelSettings'); }
function closeSettings() { togglePanel(state === 'paused' ? 'panelPause' : 'panelMenu'); }

function initUI() {
  if (playerName) {
    document.getElementById('welcomeText').textContent = `Pilot: ${playerName}`;
    togglePanel('panelMenu');
  } else togglePanel('panelAuth');

  const root = document.documentElement;
  document.getElementById('slSize').oninput = (e) => { root.style.setProperty('--btn-size', e.target.value+'px'); document.getElementById('valSize').innerText = e.target.value+'px'; };
  document.getElementById('slGap').oninput = (e) => { root.style.setProperty('--btn-gap', e.target.value+'px'); document.getElementById('valGap').innerText = e.target.value+'px'; };
  document.getElementById('slBot').oninput = (e) => { root.style.setProperty('--btn-bottom', e.target.value+'px'); document.getElementById('valBot').innerText = e.target.value+'px'; };
  
  // NEW: Sensitivity Slider
  document.getElementById('slSens').oninput = (e) => { 
    sensitivity = e.target.value / 10; 
    document.getElementById('valSens').innerText = sensitivity.toFixed(1) + 'x'; 
    player.speed = baseSpeed * sensitivity;
  };
}

function saveName() {
  const input = document.getElementById('inputName').value.trim();
  if(input.length < 3) return showAlert("Callsign min 3 karakter!");
  playerName = input.toUpperCase(); localStorage.setItem('cosmic_name', playerName);
  playSFX(600, 0.1, 0.1, 'square'); 
  startMusic(bgmMenu); 
  initUI();
}

function startMusic(track) {
  bgmMenu.pause(); bgmGame.pause();
  track.currentTime = 0;
  let playPromise = track.play();
  if(playPromise !== undefined) playPromise.catch(e => console.log("Auto-play ditahan."));
}

function playSFX(freq, vol, dur, type='square'){
  try{
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination); o.frequency.value=freq; o.type=type;
    g.gain.setValueAtTime(vol,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.start();o.stop(audioCtx.currentTime+dur);
  }catch(e){}
}

// ==========================================
// 3. LEADERBOARD SYSTEM (SUPABASE)
// ==========================================
async function fetchLeaderboard() {
  togglePanel('panelLeaderboard');
  document.getElementById('lbContent').innerHTML = '<div class="spinner" style="margin-top:20px;"></div>';
  
  const { data, error } = await supabaseClient
    .from('leaderboards')
    .select('*')
    .order('score', { ascending: false })
    .limit(10);

  if (error) {
    document.getElementById('lbContent').innerHTML = `
      <p style="color:#ff4466; text-align:left; font-size:12px;">
      <b>Gagal mengambil data!</b><br>
      Pesan: ${error.message}<br><br>
      <i>Hint: Pastikan Anda sudah membuat tabel 'leaderboards' di Supabase dan mematikan fitur Row Level Security (RLS).</i>
      </p>`;
    return;
  }

  let html = '<table class="lb-table"><tr><th>RANK</th><th>PILOT</th><th>SCORE</th></tr>';
  if(!data || data.length === 0) html += '<tr><td colspan="3" style="text-align:center;">Belum ada skor yang tercatat.</td></tr>';
  else {
    data.forEach((row, i) => {
      html += `<tr><td>#${i+1}</td><td>${row.name}</td><td style="color:#00f0ff">${row.score}</td></tr>`;
    });
  }
  html += '</table>';
  document.getElementById('lbContent').innerHTML = html;
}

async function submitScoreToDB(finalScore) {
  if (finalScore <= 0) return;
  const { error } = await supabaseClient.from('leaderboards').insert([{ name: playerName, score: finalScore }]);
  if (error) console.error("Gagal submit skor. RLS aktif?", error);
}

// ==========================================
// 4. CHAT SYSTEM
// ==========================================
function appendChatMessage(sender, text) {
  const log = document.getElementById('chatLog');
  const msg = document.createElement('div');
  msg.className = 'chat-msg';
  msg.innerHTML = `<b style="color:${sender===playerName?'#00f0ff':'#44ffaa'}">${sender}:</b> ${text}`;
  log.appendChild(msg);
  log.scrollTop = log.scrollHeight;
  setTimeout(() => { 
    msg.style.opacity = 0; 
    setTimeout(() => msg.remove(), 500); 
  }, 5000);
}

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  e.stopPropagation(); 
  if(e.key === 'Enter' && this.value.trim() !== '') {
    const text = this.value.trim();
    appendChatMessage(playerName, text);
    broadcastAction('chat_msg', { text: text, sender: playerName });
    this.value = '';
    this.blur();
  }
});

// ==========================================
// 5. DYNAMIC MULTIPLAYER & LOADING SYNC
// ==========================================
function startMatchmaking() {
  startMusic(bgmMenu);
  togglePanel('panelLobby'); gameMode = 'multi';
  roomIndex = 1; isSyncingStart = false;
  document.getElementById('btnAbortLobby').style.display = 'block';
  document.getElementById('lobbySpinner').style.display = 'block';
  document.getElementById('lobbyPlayers').innerHTML = '';
  attemptJoinRoom();
}

function attemptJoinRoom() {
  if (isSyncingStart) return;
  document.getElementById('lobbyStatus').innerText = `Memasuki Sektor [${roomIndex}]...`;
  roomChannel = supabaseClient.channel(`cosmic_room_${roomIndex}`);
  
  roomChannel
    .on('presence', { event: 'sync' }, () => {
      if (isSyncingStart) return;
      const st = roomChannel.presenceState(); 
      let users = [];
      for (const id in st) { users.push(st[id][0]); }
      
      users.sort((a, b) => a.joined_at - b.joined_at);
      let myIndex = users.findIndex(u => u.name === playerName);

      if (users.length > 2 && myIndex >= 2) {
        supabaseClient.removeChannel(roomChannel);
        roomIndex++; 
        setTimeout(attemptJoinRoom, 500);
        return;
      }
      
      let html = ''; 
      users.slice(0,2).forEach(u => html += `<div style="color:#44ffaa;">> ${u.name} [READY]</div>`);
      document.getElementById('lobbyPlayers').innerHTML = html;

      // JIKA PAS 2 ORANG, HOST MEMULAI HITUNG MUNDUR SINKRONISASI
      if (users.length === 2 && myIndex < 2) {
        amIHost = (myIndex === 0);
        player2.name = (myIndex === 0) ? users[1].name : users[0].name;
        
        if (amIHost) {
          // Beri jeda sedikit agar client selesai render tulisan READY
          setTimeout(() => broadcastAction('start_countdown', {}), 1000);
        }
      } else {
        document.getElementById('lobbyStatus').innerText = `Menunggu player ke-2 di Sektor [${roomIndex}]...`;
      }
    })
    .on('broadcast', { event: 'game_action' }, (response) => {
      const data = response.payload; 
      handleNetworkAction(data.action, data.data);
    })
    .subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await roomChannel.track({ name: playerName, joined_at: Date.now() });
      }
    });
}

function triggerMultiplayerCountdown() {
  isSyncingStart = true;
  document.getElementById('btnAbortLobby').style.display = 'none'; // Cegah abort saat loading
  document.getElementById('lobbySpinner').style.display = 'none';
  
  let count = 3;
  playSFX(400, 0.1, 0.2);
  document.getElementById('lobbyStatus').innerHTML = `<span style="font-size:24px; color:#00f0ff;">SYNCING PILOTS... ${count}</span>`;
  
  let iv = setInterval(() => {
    count--;
    if (count > 0) {
      playSFX(400, 0.1, 0.2);
      document.getElementById('lobbyStatus').innerHTML = `<span style="font-size:24px; color:#00f0ff;">SYNCING PILOTS... ${count}</span>`;
    } else {
      clearInterval(iv);
      playSFX(800, 0.2, 0.5);
      document.getElementById('lobbyStatus').innerHTML = `<span style="font-size:28px; color:#44ffaa;">LAUNCHING!</span>`;
      setTimeout(() => startGame('multi'), 500); // Mulai persis bersamaan
    }
  }, 1000);
}

function leaveLobby() {
  if(roomChannel) supabaseClient.removeChannel(roomChannel);
  togglePanel('panelMenu');
}

function broadcastAction(action, data) {
  if(gameMode === 'multi' && roomChannel) {
    roomChannel.send({ type: 'broadcast', event: 'game_action', payload: { action, data } });
  }
}

function handleNetworkAction(action, data) {
  if (action === 'start_countdown') {
    triggerMultiplayerCountdown();
  }
  else if (action === 'move') {
    player2.targetX = data.x;
    player2.active = true;
  } 
  else if (action === 'shoot') {
    data.bData.forEach(bd => {
      bullets.push({x: player2.x + bd.x, y: player2.y + bd.y, vy: bd.vy, vx: bd.vx, col: bd.col, isP2: true});
    });
    playSFX(850, 0.03, 0.05); 
  } 
  else if (action === 'e_shoot') {
    eBullets.push({x: data.x, y: data.y, vy: data.vy, vx: data.vx});
    playSFX(300, 0.02, 0.1);
  }
  else if (action === 'boss_shoot') {
    data.bullets.forEach(b => eBullets.push(b));
    playSFX(250, 0.05, 0.1);
  }
  else if (action === 'pause') {
    state = 'paused'; togglePanel('panelPause');
  } 
  else if (action === 'resume') {
    triggerResume(false); 
  } 
  else if (action === 'chat_msg') {
    appendChatMessage(data.sender, data.text);
    playSFX(1200, 0.02, 0.1, 'sine');
  } 
  else if (action === 'player_hit') {
    lives = data.lives;
    player2.invincible = 60; player2.shake = 15;
    spawnParts(player2.x, player2.y, '#44ffaa', 30, true); playSFX(150, 0.3, 0.5);
    updateHUD(); if(lives <= 0) executeGameOverLogic();
  } 
  else if (action === 'enemy_hit') {
    let e = enemies.find(en => en.id === data.id);
    if(e) e.hp = data.hp;
  }
  else if (action === 'boss_hit') {
    if(boss) boss.hp = data.hp;
    spawnParts(data.x, data.y, '#ffaa00', 5);
    playSFX(500, 0.05, 0.05);
  }
  else if (action === 'enemy_killed') {
    let idx = enemies.findIndex(en => en.id === data.id);
    if (idx !== -1) {
      spawnParts(data.x, data.y, data.color, 15);
      playSFX(400, 0.05, 0.1);
      enemies.splice(idx, 1);
    }
  }
  else if (action === 'force_state') {
    state = data.state;
    if (state === 'levelclear') {
      levelClearT = 0;
      if (bossActive) { bossActive = false; boss = null; }
      enemies.length = 0;
    }
  } 
  else if (action === 'start_level') {
    level = data.level;
    player.y = H-160;
    if (data.isBoss) spawnBoss(); else spawnEnemies();
    state = 'playing'; levelClearT = 0;
    showAlert(`SECTOR ${level} REACHED`, false);
  }
  else if (action === 'sync_state' && !amIHost) {
    score = data.score;
    if (boss && data.bossHp > 0) boss.hp = data.bossHp;
    
    const hostIds = data.enemyHps.map(e => e.id);
    for(let i = enemies.length - 1; i >= 0; i--) {
      if(!hostIds.includes(enemies[i].id)) { enemies.splice(i, 1); }
      else {
        let he = data.enemyHps.find(e => e.id === enemies[i].id);
        if(he) enemies[i].hp = he.hp;
      }
    }
  }
}

// ==========================================
// 6. GAME ENGINE
// ==========================================
function startGame(mode) {
  gameMode = mode; togglePanel(null);
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('pad').classList.remove('hidden');
  document.getElementById('chatBox').classList.remove('hidden');
  
  startMusic(bgmGame); 
  
  score=0; lives=3; level=1; frame=0;
  player.speed = baseSpeed * sensitivity; // Terapkan sensitivitas
  player.x=W/2; player.y=H+100; player.invincible=0; player.targetX = W/2; player.shake=0;
  player2.active = (mode === 'multi'); player2.x = W/2; player2.targetX = W/2; player2.shake=0; player2.invincible=0;
  bullets.length=0; eBullets.length=0; parts.length=0; shockwaves.length=0; bossActive=false;
  document.getElementById('chatLog').innerHTML = ''; 
  
  initStars(); state = 'intro';
}

function triggerPause() {
  if(state !== 'playing') return;
  state = 'paused'; togglePanel('panelPause'); playSFX(300, 0.1, 0.2);
  broadcastAction('pause', {});
}

function triggerResume(sendNet = true) {
  if(state !== 'paused') return;
  togglePanel(null); state = 'resuming'; resumeTimer = 3 * 60;
  playSFX(500, 0.1, 0.2); if(sendNet) broadcastAction('resume', {});
}

function quitGame() {
  state = 'menu';
  if(roomChannel) supabaseClient.removeChannel(roomChannel);
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('pad').classList.add('hidden');
  document.getElementById('chatBox').classList.add('hidden');
  startMusic(bgmMenu); togglePanel('panelMenu');
}

function executeGameOverLogic() {
  if (state === 'gameover') return; // Prevent double firing
  state = 'gameover'; bgmGame.pause();
  spawnParts(player.x,player.y,'#ff4466',50, true); playSFX(100, 0.5, 1);
  submitScoreToDB(score); 
  
  // Tunggu 4 detik di layar Canvas Game Over lalu quit
  setTimeout(() => { quitGame(); }, 4000);
}

// --- Spawners ---
function initStars(){
  stars.length=0;
  for(let i=0;i<120;i++) stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.5, spd:Math.random()*2+1, b:Math.random()});
}

function spawnParts(x, y, col, n=15, isBig=false){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28; const s = isBig ? Math.random()*7+2 : Math.random()*4+1;
    parts.push({x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, dec: 0.02+Math.random()*0.03, r: isBig ? Math.random()*4+1 : Math.random()*2+1, col});
  }
  shockwaves.push({x, y, r: 5, maxR: isBig ? 80 : 35, alpha: 1, col, speed: isBig ? 4 : 2});
}

const EC=['#ff4466','#ff6600','#aa44ff','#44ffaa','#ffcc00'];
function spawnEnemies(){
  enemies.length=0; eBullets.length=0;
  const rows=Math.min(2+Math.floor(level/2), 6), cols=Math.min(5+level, 9);
  const startX = W/2 - ((cols-1)*45)/2;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    enemies.push({
      id: `${r}_${c}`, 
      x:startX+c*45, y:-50-r*40, targetY:40+r*40, hp:(level>4)?2:1, 
      color:EC[(r+level)%EC.length], dir:1, t: c*0.5
    });
  }
}

function spawnBoss(){
  bossActive=true;
  boss={x:W/2, y:-100, hp:30+level*5, maxHp:30+level*5, dx:2.5, dir:1, t:0, st:0};
}

// --- Update Logic ---
function update() {
  frame++;
  if(state === 'auth' || state === 'menu' || state === 'lobby' || state === 'paused') return;

  stars.forEach(s => {
    s.y += s.spd * (state==='intro' || state==='resuming' ? 4 : 1); 
    if(s.y>H){ s.y=0; s.x=Math.random()*W; }
  });

  if(state === 'resuming') {
    resumeTimer--; if(resumeTimer <= 0) state = 'playing'; return;
  }

  if(state === 'intro') {
    player.y -= 4; 
    if(player.y <= H-160) { 
      player.y = H-160; 
      if (gameMode === 'solo' || amIHost) {
        state = 'playing'; spawnEnemies(); 
        if(gameMode === 'multi') broadcastAction('start_level', {level: level, isBoss: false});
      }
    } 
    return;
  }

  if(state === 'gameover') { updateParticles(); return; }

  if(state === 'levelclear') {
    if (levelClearT < 100) { levelClearT++; player.y -= 2; }
    updateParticles();
    if(levelClearT >= 100 && (gameMode === 'solo' || amIHost)) {
      player.y = H-160;
      level++;
      if(level%5===0) spawnBoss(); else spawnEnemies();
      state='playing'; levelClearT=0; showAlert(`SECTOR ${level} REACHED`, false);
      if(gameMode === 'multi') broadcastAction('start_level', { level: level, isBoss: (level%5===0) });
    }
    return; 
  }

  if(keys.left) player.targetX -= player.speed;
  if(keys.right) player.targetX += player.speed;
  player.targetX = Math.max(20, Math.min(W-20, player.targetX));
  player.x += (player.targetX - player.x) * 0.5; 

  if(frame % 3 === 0) broadcastAction('move', {x: player.x});
  if(player2.active) { player2.x += (player2.targetX - player2.x) * 0.5; }

  if (gameMode === 'multi' && amIHost && frame % 10 === 0) { 
    broadcastAction('sync_state', {
      score: score, bossHp: boss ? boss.hp : 0,
      enemyHps: enemies.map(e => ({id: e.id, hp: e.hp}))
    });
  }

  // Shooting
  if(shotCD <= 0) {
    let bCol = level >= 5 ? '#ffaa00' : '#00f0ff';
    let localBullets = [];
    
    if(level < 3) localBullets.push({x: 0, y: -20, vy: -12, vx: 0, col: bCol});
    else if (level < 5) {
      localBullets.push({x: -8, y: -20, vy: -12, vx: 0, col: bCol});
      localBullets.push({x: 8, y: -20, vy: -12, vx: 0, col: bCol});
    } else {
      localBullets.push({x: 0, y: -25, vy: -13, vx: 0, col: bCol});
      localBullets.push({x: -15, y: -15, vy: -11, vx: -1, col: '#ff4466'});
      localBullets.push({x: 15, y: -15, vy: -11, vx: 1, col: '#ff4466'});
    }

    localBullets.forEach(b => bullets.push({x: player.x + b.x, y: player.y + b.y, vy: b.vy, vx: b.vx, col: b.col}));
    broadcastAction('shoot', { bData: localBullets }); 
    shotCD = 10; playSFX(800, 0.05, 0.05);
  }
  if(shotCD>0) shotCD--;

  bullets.forEach(b=>{ b.y+=b.vy; if(b.vx)b.x+=b.vx; });
  for(let i=bullets.length-1;i>=0;i--) if(bullets[i].y<-10) bullets.splice(i,1);
  if(player.invincible>0) player.invincible--;

  if(!bossActive) {
    let spd = Math.min(2.5, 1 + level * 0.1); 
    let edge = false;
    enemies.forEach(e => {
      if(e.y < e.targetY) e.y += 2;
      else { e.x += spd * e.dir; e.t += 0.08; if(e.x > W-20 || e.x < 20) edge = true; }
    });
    if(edge) enemies.forEach(e => { e.dir *= -1; e.y += Math.min(15, 5+level); });

    enemies.forEach(e => { if(e.y > player.y-30 && player.invincible <= 0) hitPlayer(); });

    if (gameMode === 'solo' || amIHost) {
      eShootT++;
      if(eShootT >= Math.max(20, 70-level*4) && enemies.length > 0) {
        eShootT = 0; 
        let sh = enemies[frame % enemies.length];
        let eData = {x:sh.x, y:sh.y+15, vy: 3+level*0.3, vx: 0};
        eBullets.push(eData); playSFX(300, 0.02, 0.1);
        if(gameMode === 'multi') broadcastAction('e_shoot', eData);
      }
    }

    if(enemies.length === 0 && state === 'playing') { 
      if (gameMode === 'solo' || amIHost) { 
        state='levelclear'; levelClearT=0; 
        if(gameMode === 'multi') broadcastAction('force_state', {state: 'levelclear'});
      }
    }
  } else if (boss) {
    boss.t += 0.04; boss.x += boss.dx * boss.dir;
    if(boss.x > W-70 || boss.x < 70) boss.dir *= -1;
    if (boss.y < 80) boss.y += 2; 
    else boss.y = 80 + Math.sin(boss.t)*30; 

    if (gameMode === 'solo' || amIHost) {
      boss.st++;
      if(boss.st >= Math.max(15, 40-level*1.5)) {
        boss.st=0;
        let bSet = [];
        for(let a=-2; a<=2; a+=2) bSet.push({x:boss.x+a*15, y:boss.y+40, vy:5+level*0.2, vx:a*1.2});
        bSet.forEach(b => eBullets.push(b));
        playSFX(250, 0.05, 0.1);
        if(gameMode === 'multi') broadcastAction('boss_shoot', {bullets: bSet});
      }
    }
  }

  for(let i=eBullets.length-1; i>=0; i--) {
    let b = eBullets[i]; b.y += b.vy; if(b.vx) b.x += b.vx;
    if(b.y > H+10) { eBullets.splice(i,1); continue; }
    if(player.invincible<=0 && Math.abs(b.x-player.x)<14 && Math.abs(b.y-player.y)<14){
      hitPlayer(); eBullets.splice(i,1);
    }
  }

  for(let i=bullets.length-1; i>=0; i--) {
    let b = bullets[i]; let hit = false;
    
    if(bossActive && boss && Math.abs(b.x-boss.x)<50 && Math.abs(b.y-boss.y)<35){
      hit=true; spawnParts(b.x, b.y, '#ffaa00', 5); playSFX(500, 0.05, 0.05);
      
      if(gameMode === 'solo' || amIHost) {
        boss.hp--;
        score += 20;
        if(gameMode === 'multi') broadcastAction('boss_hit', {hp: boss.hp, x: b.x, y: b.y});
        
        if(boss.hp <= 0) {
          spawnParts(boss.x, boss.y, '#ff4466', 80, true); 
          score+=1000; bossActive=false; boss=null; state='levelclear'; levelClearT=0; playSFX(100, 0.5, 1);
          if(gameMode === 'multi') broadcastAction('force_state', {state: 'levelclear'});
        }
      }
    }

    for(let j=enemies.length-1; j>=0 && !hit; j--) {
      let e = enemies[j];
      if(Math.abs(b.x-e.x)<18 && Math.abs(b.y-e.y)<15) {
        hit = true; spawnParts(e.x, e.y, '#fff', 5);
        
        if (gameMode === 'solo' || amIHost) {
          e.hp--;
          if(e.hp <= 0) {
            spawnParts(e.x, e.y, e.color, 15); 
            score += 20; playSFX(400, 0.05, 0.1);
            if(gameMode === 'multi') broadcastAction('enemy_killed', {id: e.id, x:e.x, y:e.y, color:e.color});
            enemies.splice(j,1); 
          } else {
            if(gameMode === 'multi') broadcastAction('enemy_hit', {id: e.id, hp: e.hp});
          }
        }
      }
    }
    if(hit) bullets.splice(i,1);
  }

  updateParticles();
}

function hitPlayer() {
  lives--; player.invincible = 60; player.shake = 15; 
  spawnParts(player.x, player.y, '#00f0ff', 30, true); playSFX(150, 0.3, 0.5);
  updateHUD(); 
  broadcastAction('player_hit', {lives: lives}); 
  if(lives <= 0) executeGameOverLogic();
}

function updateParticles() {
  for(let i=parts.length-1;i>=0;i--){
    let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.95; p.vy*=0.95; p.life-=p.dec;
    if(p.life<=0) parts.splice(i,1);
  }
  for(let i=shockwaves.length-1;i>=0;i--){
    let sw=shockwaves[i]; sw.r+=sw.speed; sw.alpha-=0.05;
    if(sw.alpha<=0) shockwaves.splice(i,1);
  }
}

// --- Vector Render ---
function draw() {
  ctx.clearRect(0,0,W,H);
  
  stars.forEach(s => {
    let b = 0.3 + s.b * 0.7; ctx.fillStyle = `rgba(255,255,255,${b})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28); ctx.fill();
  });

  if(state === 'auth' || state === 'menu' || state === 'lobby') return;

  ctx.lineWidth = 2;
  shockwaves.forEach(sw => {
    ctx.globalAlpha = Math.max(0, sw.alpha); ctx.strokeStyle = sw.col; ctx.shadowColor = sw.col; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2); ctx.stroke();
  });
  ctx.globalAlpha = 1;

  parts.forEach(p => {
    ctx.globalAlpha = Math.max(0, p.life); ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, 6.28); ctx.fill();
  });
  ctx.globalAlpha = 1;

  bullets.forEach(b => {
    ctx.shadowColor = b.col; ctx.shadowBlur = 10; ctx.fillStyle = b.col;
    ctx.fillRect(b.x-2, b.y-8, 4, 16); ctx.shadowBlur = 0;
  });
  eBullets.forEach(b => {
    ctx.shadowColor = '#ff4444'; ctx.shadowBlur = 10; ctx.fillStyle = '#ff4444';
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, 6.28); ctx.fill(); ctx.shadowBlur = 0;
  });

  if(!bossActive) {
    enemies.forEach(e => {
      ctx.save(); ctx.translate(e.x, e.y);
      let s = 0.9 + Math.sin(e.t)*0.1; ctx.scale(s, s);
      ctx.shadowColor = e.color; ctx.shadowBlur = 10; ctx.strokeStyle = e.color; ctx.fillStyle = e.color+'33';
      ctx.beginPath(); ctx.moveTo(0,-12); ctx.lineTo(-12,-4); ctx.lineTo(-15,8); ctx.lineTo(-6,12); ctx.lineTo(6,12); ctx.lineTo(15,8); ctx.lineTo(12,-4); ctx.closePath();
      ctx.fill(); ctx.stroke();
      ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(-6,3,3,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(6,3,3,0,6.28); ctx.fill();
      ctx.restore();
    });
  } else if(boss) {
    ctx.save(); ctx.translate(boss.x, boss.y);
    let s = 0.95 + Math.sin(boss.t*2)*0.05; ctx.scale(s, s);
    ctx.shadowColor='#ff4466'; ctx.shadowBlur=25; ctx.strokeStyle='#ff4466'; ctx.fillStyle='#220011'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,-35); ctx.lineTo(-45,-15); ctx.lineTo(-50,25); ctx.lineTo(-25,35); ctx.lineTo(25,35); ctx.lineTo(50,25); ctx.lineTo(45,-15); ctx.closePath();
    ctx.fill(); ctx.stroke();
    
    let hr = Math.max(0, boss.hp/boss.maxHp);
    ctx.fillStyle = '#ff000044'; ctx.fillRect(-45, 45, 90, 8);
    ctx.fillStyle = `hsl(${hr*120},100%,55%)`; ctx.fillRect(-45, 45, 90 * hr, 8);
    ctx.restore();
  }

  if(player2.active) {
    let sx2 = player2.shake > 0 ? (Math.random()-.5) * player2.shake : 0;
    let sy2 = player2.shake > 0 ? (Math.random()-.5) * player2.shake * 0.5 : 0;
    if (player2.shake > 0) player2.shake--;
    drawShip(player2.x + sx2, player2.y + sy2, player2.invincible>0, true, player2.name);
    if(player2.invincible > 0) player2.invincible--;
  }

  if(state !== 'gameover') {
    let sx = player.shake > 0 ? (Math.random()-.5) * player.shake : 0;
    let sy = player.shake > 0 ? (Math.random()-.5) * player.shake * 0.5 : 0;
    if (player.shake > 0) player.shake--;
    drawShip(player.x + sx, player.y + sy, player.invincible>0, false, playerName);
  }

  // NEW: Game Over Screen in Canvas
  if(state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff4466'; ctx.font = 'bold 50px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#ff4466'; ctx.shadowBlur = 20;
    ctx.fillText("GAME OVER", W/2, H/2 - 30);
    ctx.fillStyle = '#00f0ff'; ctx.font = 'bold 24px monospace'; ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 10;
    ctx.fillText(`FINAL SCORE: ${score}`, W/2, H/2 + 25);
    ctx.shadowBlur = 0; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  if(state === 'resuming') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#00f0ff'; ctx.font = 'bold 80px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 20;
    let sec = Math.ceil(resumeTimer / 60); ctx.fillText(sec, W/2, H/2);
    ctx.shadowBlur = 0; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }

  updateHUD();
}

function drawShip(x, y, inv, isP2, name) {
  if(inv && Math.floor(frame/4)%2===0) return;
  ctx.save(); ctx.translate(x, y);
  
  let coreCol = isP2 ? '#44ffaa' : (level >= 5 ? '#ffaa00' : '#00f0ff');
  let wingCol = isP2 ? '#004422' : (level >= 5 ? '#ff4466' : '#002244');

  ctx.shadowColor = coreCol; ctx.shadowBlur = 15;
  ctx.strokeStyle = coreCol; ctx.lineWidth = 2; ctx.fillStyle = wingCol;

  ctx.beginPath(); ctx.moveTo(0,-16); ctx.lineTo(-16,14); ctx.lineTo(-6,10); ctx.lineTo(0,12); ctx.lineTo(6,10); ctx.lineTo(16,14); ctx.closePath();
  ctx.fill(); ctx.stroke();

  if(level >= 3) {
    ctx.beginPath(); ctx.moveTo(-16,14); ctx.lineTo(-24,20); ctx.lineTo(-6,12);
    ctx.moveTo(16,14); ctx.lineTo(24,20); ctx.lineTo(6,12);
    ctx.strokeStyle = '#fff'; ctx.stroke();
  }

  if(level >= 5) {
    ctx.beginPath(); ctx.moveTo(-10, 5); ctx.lineTo(-10, -10);
    ctx.moveTo(10, 5); ctx.lineTo(10, -10);
    ctx.strokeStyle = '#ffaa00'; ctx.lineWidth = 3; ctx.stroke();
  }

  ctx.fillStyle = coreCol; ctx.beginPath(); ctx.moveTo(0,-10); ctx.lineTo(-5,4); ctx.lineTo(5,4); ctx.closePath(); ctx.fill();
  const fl = 0.6 + Math.sin(frame*0.5)*0.4;
  ctx.shadowColor = '#ff8800'; ctx.strokeStyle = `rgba(255,160,0,${fl})`; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-6,12); ctx.lineTo(-4,12+fl*15); ctx.lineTo(0,12); ctx.moveTo(0,12); ctx.lineTo(4,12+fl*15); ctx.lineTo(6,12); ctx.stroke();

  ctx.shadowBlur = 0; ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '10px monospace'; ctx.textAlign = 'center';
  ctx.fillText(name, 0, 35);
  ctx.restore();
}

function updateHUD() {
  document.getElementById('hudScore').innerText = `SCORE: ${score}`;
  document.getElementById('hudLv').innerText = `LV ${level}`;
  document.getElementById('hudLives').innerText = `▲ x${lives}`;
}

// --- Inputs ---
function bindBtn(id, key){
  const el = document.getElementById(id);
  const press = (e) => { e.preventDefault(); keys[key]=true; el.classList.add('pressed'); };
  const release = (e) => { e.preventDefault(); keys[key]=false; el.classList.remove('pressed'); };
  el.addEventListener('touchstart', press, {passive:false}); el.addEventListener('mousedown', press);
  el.addEventListener('touchend', release, {passive:false}); el.addEventListener('mouseup', release);
  el.addEventListener('mouseleave', release);
}
bindBtn('btnLeft', 'left'); bindBtn('btnRight', 'right');

document.getElementById('btnPause').addEventListener('click', () => { if(state === 'playing') triggerPause(); });

document.addEventListener('keydown', e => {
  if (document.activeElement === document.getElementById('chatInput') || document.activeElement === document.getElementById('inputName')) return;
  
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=true;
});
document.addEventListener('keyup', e => {
  if (document.activeElement === document.getElementById('chatInput') || document.activeElement === document.getElementById('inputName')) return;
  
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.right=false;
});

function loop(){ update(); draw(); requestAnimationFrame(loop); }
initUI(); loop();

</script>
</body>
